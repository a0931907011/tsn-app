<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>泰膳娘 - 人事成本與變形工時分析</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"
      }
    }
  </script>
  <style>
    @media print {
      @page { size: A4 landscape; margin: 10mm; }
      body { background: white !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .no-print { display: none !important; }
      .print-shadow-none { box-shadow: none !important; border: 1px solid #e5e7eb !important; }
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, getDoc } from 'firebase/firestore';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { 
      Calculator, CalendarDays, DollarSign, Settings, X, 
      AlertCircle, CheckCircle2, ChevronLeft, ChevronRight, TrendingUp, Users, Shield, Lock, LogOut,
      FileSpreadsheet, Printer, Download
    } from 'lucide-react';

    const firebaseConfig = {
      apiKey: "AIzaSyCitzdvwC1VEjXq_-ypAVhkeo9aWwuTfQI",
      authDomain: "tsn-shife.firebaseapp.com",
      projectId: "tsn-shife",
      storageBucket: "tsn-shife.firebasestorage.app",
      messagingSenderId: "453632681741",
      appId: "1:453632681741:web:13f163e924e34f2fa2b244"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'tsn-official-app'; 

    export default function App() {
      const [user, setUser] = useState(null);
      const [ready, setReady] = useState(false);
      const [role, setRole] = useState('none');
      const [isLoadingAuth, setIsLoadingAuth] = useState(false);

      useEffect(() => {
        signInAnonymously(auth).catch(err => console.error(err));
        return onAuthStateChanged(auth, (u) => { 
          if(u) { setUser(u); setReady(true); } 
        });
      }, []);

      const handleLogin = async () => {
        setIsLoadingAuth(true);
        const pwd = document.getElementById('pwd-input').value;
        let adminPwd = "tsn168"; 
        try {
          const authDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'auth'));
          if (authDoc.exists() && authDoc.data().admin) adminPwd = authDoc.data().admin;
        } catch (e) { console.error(e); }
        
        if (pwd === adminPwd) setRole('admin');
        else alert("密碼錯誤！請輸入最高主管權限密碼。");
        setIsLoadingAuth(false);
      };

      if (!ready) return <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center text-white font-bold animate-pulse"><span className="text-3xl tracking-widest mb-4">泰膳娘金庫連線中...</span></div>;

      if (role === 'none') return (
        <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6 font-sans">
          <div className="bg-white rounded-[3rem] p-12 w-full max-w-md text-center shadow-2xl border-4 border-indigo-50 animate-in zoom-in-95">
            <Lock className="mx-auto text-indigo-600 mb-6" size={64} />
            <h1 className="text-3xl font-black mb-2 text-slate-800">人事成本系統</h1>
            <p className="text-slate-500 mb-8 font-bold">老闆與高階管理專用入口</p>
            <input id="pwd-input" type="password" autoFocus placeholder="請輸入主管通行密碼" className="w-full border-4 border-slate-100 p-5 rounded-3xl text-center text-3xl mb-6 focus:border-indigo-500 outline-none font-black shadow-inner bg-slate-50" onKeyDown={(e) => { if (e.key === 'Enter') handleLogin(); }} />
            <button onClick={handleLogin} disabled={isLoadingAuth} className="w-full bg-indigo-600 text-white py-6 rounded-3xl font-black text-2xl hover:bg-indigo-700 transition-colors shadow-2xl active:scale-95 flex justify-center items-center gap-3"><Lock size={28} /> {isLoadingAuth ? '驗證中...' : '解鎖登入'}</button>
          </div>
        </div>
      );

      return <PayrollApp user={user} onLogout={() => setRole('none')} />;
    }

    function PayrollApp({ user, onLogout }) {
      const [employees, setEmployees] = useState([]);
      const [shifts, setShifts] = useState([]);
      const [settings, setSettings] = useState({ ptWage: 183, monthlyWage: 30000 });
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [editingWages, setEditingWages] = useState({});
      const [date, setDate] = useState(new Date(2026, 3, 16));
      const [view, setView] = useState('daily'); 
      const [base, setBase] = useState(() => localStorage.getItem('tsn_base') || '0931907011');

      useEffect(() => {
        const p = (n) => collection(db, 'artifacts', appId, 'public', 'data', n);
        const u1 = onSnapshot(p('employees'), s => setEmployees(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const u2 = onSnapshot(p('shifts'), s => setShifts(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const u3 = onSnapshot(p('settings'), s => {
          const payrollConfig = s.docs.find(d => d.id === 'payroll');
          if (payrollConfig) setSettings(payrollConfig.data());
        });
        return () => { u1(); u2(); u3(); };
      }, []);

      const getDayKey = (d) => `${d.getFullYear()}_${d.getMonth() + 1}_${d.getDate()}`;
      const timeToDecimal = (t) => { if (!t) return 0; const [h, m] = t.split(':').map(Number); return h + (m / 60); };

      const dailyData = useMemo(() => {
        const targetKey = getDayKey(date);
        const todayShifts = shifts.filter(s => s.key === targetKey && s.leaveType === 'work' && s.base === base);
        let totalDailyCost = 0;
        let totalOvertimeCost = 0;

        const records = todayShifts.map(shift => {
          const emp = employees.find(e => e.id === shift.empId);
          if (!emp) return null;

          let dailyHours = 0;
          [1, 2, 3].forEach(n => {
            if (shift[`shift${n}Start`] && shift[`shift${n}End`]) {
              const start = timeToDecimal(shift[`shift${n}Start`]);
              const end = timeToDecimal(shift[`shift${n}End`]);
              if (end > start) dailyHours += (end - start);
            }
          });

          let cost = 0;
          let overtimeHours = 0;
          let overtimeCost = 0;

          if (emp.type === 'PT') {
            const ptWage = emp.baseWage ? Number(emp.baseWage) : settings.ptWage;
            cost = dailyHours * ptWage;
            totalDailyCost += cost;
          } else {
            const monthlyWage = emp.baseWage ? Number(emp.baseWage) : settings.monthlyWage;
            const dailyBaseWage = monthlyWage / 30;
            const hourlyRate = monthlyWage / 240; 
            cost = dailyBaseWage;
            totalDailyCost += cost;

            if (dailyHours > 8) {
              overtimeHours = dailyHours - 8;
              overtimeCost = overtimeHours * hourlyRate * 1.34;
              totalOvertimeCost += overtimeCost;
            }
          }
          return { ...emp, dailyHours, cost, overtimeHours, overtimeCost };
        }).filter(Boolean);

        return { records, totalDailyCost: Math.round(totalDailyCost + totalOvertimeCost), totalOvertimeCost: Math.round(totalOvertimeCost) };
      }, [shifts, employees, date, base, settings]);

      const fourWeekData = useMemo(() => {
        const records = [];
        const d28 = Array.from({length: 28}, (_, i) => { const x = new Date(date); x.setDate(x.getDate() + i); return x; });
        
        employees.filter(e => e.base === base).forEach(emp => {
          let totalHours28 = 0;
          let daysOff = 0;
          let maxDailyHours = 0;
          d28.forEach(d => {
            const dKey = getDayKey(d);
            const shift = shifts.find(s => s.empId === emp.id && s.key === dKey);
            if (!shift || shift.leaveType !== 'work') {
              daysOff++;
            } else {
              let dailyHours = 0;
              [1, 2, 3].forEach(n => {
                if (shift[`shift${n}Start`] && shift[`shift${n}End`]) {
                  dailyHours += (timeToDecimal(shift[`shift${n}End`]) - timeToDecimal(shift[`shift${n}Start`]));
                }
              });
              totalHours28 += dailyHours;
              if (dailyHours > maxDailyHours) maxDailyHours = dailyHours;
            }
          });
          records.push({ ...emp, totalHours28: parseFloat(totalHours28.toFixed(1)), daysOff, maxDailyHours: parseFloat(maxDailyHours.toFixed(1)) });
        });
        return { records: records.sort((a,b) => b.totalHours28 - a.totalHours28), periodEnd: d28[27] };
      }, [shifts, employees, date, base]);

      const openSettingsModal = () => {
        const initialWages = {};
        employees.filter(e => e.base === base).forEach(e => { initialWages[e.id] = e.baseWage || ''; });
        setEditingWages(initialWages);
        setIsSettingsOpen(true);
      };

      const saveSettings = async () => {
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'payroll'), settings);
        for (const emp of employees.filter(e => e.base === base)) {
          const newWage = editingWages[emp.id];
          if (newWage !== emp.baseWage && newWage !== undefined) {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employees', emp.id), { baseWage: newWage === '' ? null : Number(newWage) });
          }
        }
        setIsSettingsOpen(false);
        alert('基本參數與員工專屬薪資已儲存！');
      };

      // 新增：下載人事設定備份
      const downloadBackup = () => {
        const data = { employees, shifts, settings, backupDate: new Date().toISOString(), type: 'payroll_backup' };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url;
        a.download = `泰膳娘_人事設定備份_${getDayKey(new Date())}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        alert("📥 備份下載完成！");
      };

      // 新增：匯出日成本分析 Excel
      const exportDailyExcel = () => {
        let csvContent = '\uFEFF';
        csvContent += "日期,員工姓名,計薪方式,排班總工時(hr),超時加班(hr),預估加班費,預估薪資成本\n";
        const dateStr = `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()}`;
        dailyData.records.forEach(r => {
           csvContent += `${dateStr},${r.name},${r.type},${r.dailyHours.toFixed(1)},${r.overtimeHours > 0 ? r.overtimeHours.toFixed(1) : 0},${Math.round(r.overtimeCost)},${Math.round(r.cost + r.overtimeCost)}\n`;
        });
        csvContent += `總計,,,,,,${dailyData.totalDailyCost}\n`;
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a"); link.setAttribute("href", url);
        link.setAttribute("download", `泰膳娘_日人事成本_${dateStr.replace(/\//g, '')}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      return (
        <div className="min-h-screen flex flex-col font-black selection:bg-indigo-200">
          <nav className="bg-white p-6 shadow-md flex justify-between items-center sticky top-0 z-40 border-b-4 border-indigo-600 no-print">
            <div className="flex items-center gap-4">
              <div className="p-3 bg-indigo-600 rounded-2xl text-white shadow-lg"><Calculator size={32}/></div>
              <div>
                <h1 className="text-3xl font-black text-slate-800">人事成本與工時分析</h1>
                <div className="text-sm text-slate-500 mt-1">老闆/人資專用儀表板 | 店鋪: {base}</div>
              </div>
            </div>
            
            <div className="flex items-center gap-4 flex-wrap">
              <div className="flex bg-slate-100 p-2 rounded-xl shadow-inner border border-slate-200">
                <button onClick={() => setView('daily')} className={`px-6 py-2.5 rounded-lg text-lg transition-all ${view==='daily'?'bg-white text-indigo-700 shadow-md':'text-slate-500 hover:text-indigo-600'}`}>日成本預估</button>
                <button onClick={() => setView('4week')} className={`px-6 py-2.5 rounded-lg text-lg transition-all ${view==='4week'?'bg-white text-indigo-700 shadow-md':'text-slate-500 hover:text-indigo-600'}`}>四週變形工時檢核</button>
              </div>
              <button onClick={openSettingsModal} className="p-3 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-xl transition-colors shadow-inner" title="基本薪資設定"><Settings size={24}/></button>
              <button onClick={downloadBackup} className="p-3 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-xl transition-colors shadow-inner" title="下載資料備份"><Download size={24}/></button>
              <button onClick={onLogout} className="p-3 bg-red-50 text-red-600 hover:bg-red-100 rounded-xl transition-colors shadow-inner" title="登出系統"><LogOut size={24}/></button>
            </div>
          </nav>

          <main className="flex-1 w-full max-w-[1400px] mx-auto p-4 md:p-8 print:p-0">
            {view === 'daily' && (
              <div className="space-y-6 animate-in fade-in slide-in-from-bottom-5">
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 no-print gap-4">
                  <div className="flex items-center gap-2 bg-indigo-50 p-2 rounded-xl shadow-inner border border-indigo-100">
                    <button onClick={() => setDate(new Date(date.getFullYear(), date.getMonth(), date.getDate() - 1))} className="p-2 hover:bg-white rounded-lg transition-colors text-indigo-600"><ChevronLeft size={24}/></button>
                    <div className="relative flex items-center gap-2 px-4 cursor-pointer text-indigo-800 bg-white py-1.5 rounded-lg shadow-sm">
                      <CalendarDays size={20} />
                      <span className="text-xl font-black">{date.getFullYear()}年 {date.getMonth() + 1}月 {date.getDate()}日</span>
                      <input type="date" className="absolute inset-0 opacity-0 cursor-pointer" value={`${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`} onChange={(e) => { if(e.target.value) { const [y, m, d] = e.target.value.split('-'); setDate(new Date(y, m - 1, d)); } }} />
                    </div>
                    <button onClick={() => setDate(new Date(date.getFullYear(), date.getMonth(), date.getDate() + 1))} className="p-2 hover:bg-white rounded-lg transition-colors text-indigo-600"><ChevronRight size={24}/></button>
                  </div>
                  
                  {/* 新增：日成本匯出與列印按鈕 */}
                  <div className="flex items-center gap-4 flex-wrap">
                    <button onClick={exportDailyExcel} className="bg-green-100 text-green-700 hover:bg-green-200 px-6 py-3 rounded-xl font-black flex items-center gap-2 transition-colors border border-green-200"><FileSpreadsheet size={20}/> 匯出 Excel</button>
                    <button onClick={() => window.print()} className="bg-orange-100 text-orange-700 hover:bg-orange-200 px-6 py-3 rounded-xl font-black flex items-center gap-2 transition-colors border border-orange-200"><Printer size={20}/> 列印 PDF</button>
                    
                    <div className="flex gap-4 ml-4 pl-4 border-l-2 border-slate-200">
                      <div className="bg-orange-50 px-6 py-3 rounded-2xl border border-orange-200 text-right"><div className="text-orange-600 text-sm font-bold">預估加班費</div><div className="text-2xl font-black text-orange-700">${dailyData.totalOvertimeCost.toLocaleString()}</div></div>
                      <div className="bg-indigo-600 px-8 py-3 rounded-2xl text-white text-right shadow-lg shadow-indigo-200"><div className="text-indigo-200 text-sm font-bold">當日總人事成本預估</div><div className="text-3xl font-black">${dailyData.totalDailyCost.toLocaleString()}</div></div>
                    </div>
                  </div>
                </div>

                <div className="hidden print:block text-center mb-6">
                   <h2 className="text-2xl font-black">{date.getFullYear()}年{date.getMonth() + 1}月{date.getDate()}日 - 日人事成本預估表</h2>
                </div>

                <div className="bg-white rounded-[3rem] print:rounded-none shadow-xl print-shadow-none border border-slate-200 print:border-none overflow-hidden">
                  <table className="w-full text-center">
                    <thead className="bg-slate-800 text-white print:bg-slate-100 print:text-black text-lg">
                      <tr><th className="py-5 px-4 rounded-tl-[2.5rem] print:rounded-none">員工姓名</th><th className="py-5 px-4">計薪方式</th><th className="py-5 px-4">排班總工時</th><th className="py-5 px-4 text-orange-400 print:text-black">超時加班 ( >8hr )</th><th className="py-5 px-4 rounded-tr-[2.5rem] print:rounded-none">預估薪資成本</th></tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100 print:divide-slate-300 text-lg">
                      {dailyData.records.length === 0 ? (
                        <tr><td colSpan="5" className="py-12 text-slate-400">當日無排班資料</td></tr>
                      ) : dailyData.records.map((r, i) => (
                        <tr key={i} className="hover:bg-slate-50">
                          <td className="py-5 px-4 font-black text-slate-800 text-xl print:text-black border-b print:border-slate-300">{r.name}</td>
                          <td className="py-5 px-4 border-b print:border-slate-300"><span className={`px-3 py-1 rounded-full text-sm ${r.type==='PT'?'bg-teal-100 text-teal-700':'bg-blue-100 text-blue-700'}`}>{r.type}</span></td>
                          <td className="py-5 px-4 font-mono font-black text-2xl text-slate-600 print:text-black border-b print:border-slate-300">{r.dailyHours.toFixed(1)} <span className="text-sm">hr</span></td>
                          <td className="py-5 px-4 border-b print:border-slate-300">
                            {r.overtimeHours > 0 ? <span className="bg-red-100 text-red-700 px-3 py-1 rounded-lg font-black print:border print:border-black">+ {r.overtimeHours.toFixed(1)} hr (${Math.round(r.overtimeCost)})</span> : <span className="text-slate-300 print:text-black">-</span>}
                          </td>
                          <td className="py-5 px-4 font-black text-indigo-700 print:text-black text-2xl border-b print:border-slate-300">${Math.round(r.cost + r.overtimeCost).toLocaleString()}</td>
                        </tr>
                      ))}
                      <tr className="hidden print:table-row bg-slate-100 font-black text-xl"><td colSpan="4" className="py-4 text-right pr-6 border-t-2 border-black">當日總成本合計：</td><td className="py-4 text-indigo-800 border-t-2 border-black">${dailyData.totalDailyCost.toLocaleString()}</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {view === '4week' && (
              <div className="space-y-6 animate-in fade-in slide-in-from-bottom-5">
                <div className="bg-indigo-900 text-white p-8 rounded-[3rem] shadow-2xl flex flex-col md:flex-row justify-between items-center gap-6 relative overflow-hidden">
                  <div className="absolute -right-10 -top-10 opacity-10 pointer-events-none"><Shield size={300}/></div>
                  <div className="relative z-10"><h2 className="text-3xl font-black mb-2 flex items-center gap-3"><AlertCircle className="text-yellow-400"/> 四週變形工時法規檢核表</h2><p className="text-indigo-200">依據勞基法第30條之1：四週(28天)正常工時不得超過 <strong className="text-white text-xl">160</strong> 小時，例假日+休息日不得少於 <strong className="text-white text-xl">8</strong> 天。</p></div>
                  <div className="relative z-10 bg-indigo-800 p-4 rounded-2xl flex items-center gap-4 border border-indigo-700"><div className="text-indigo-200 text-sm font-bold text-right">選擇計算起始日<br/>(建議選週一)</div><input type="date" className="bg-white text-indigo-900 font-black p-2 rounded-xl outline-none cursor-pointer" value={`${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`} onChange={(e) => { if(e.target.value) { const [y, m, d] = e.target.value.split('-'); setDate(new Date(y, m - 1, d)); } }} /></div>
                </div>

                <div className="bg-white rounded-[3rem] shadow-xl border border-slate-200 p-8">
                  <h3 className="text-xl text-slate-500 mb-6 font-bold flex justify-between items-end"><span>區間：{date.getMonth()+1}/{date.getDate()} ~ {fourWeekData.periodEnd.getMonth()+1}/{fourWeekData.periodEnd.getDate()} (共28天)</span><span className="text-sm bg-slate-100 px-4 py-2 rounded-lg">紅燈表示超過法規上限，需支付加班費或調整班表</span></h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                    {fourWeekData.records.map(r => {
                      const isHoursWarning = r.totalHours28 > 160;
                      const isOffWarning = r.daysOff < 8;
                      const isDailyWarning = r.maxDailyHours > 10; 
                      return (
                        <div key={r.id} className={`p-6 rounded-[2rem] border-4 transition-all ${isHoursWarning || isOffWarning ? 'border-red-100 bg-red-50/30' : 'border-slate-100 hover:border-indigo-100 hover:shadow-md'}`}>
                          <div className="flex justify-between items-center mb-6 border-b-2 border-slate-100 pb-4">
                            <div className="text-2xl font-black text-slate-800 flex items-center gap-2">{r.name} <span className="text-sm text-slate-400 font-bold bg-slate-100 px-2 py-1 rounded-md">{r.type}</span></div>
                            {(isHoursWarning || isOffWarning) ? <span className="bg-red-500 text-white px-3 py-1 rounded-full text-xs font-bold animate-pulse shadow-[0_0_10px_#ef4444]">注意違規風險</span> : <span className="text-green-500 flex items-center gap-1"><CheckCircle2 size={20}/> 正常</span>}
                          </div>
                          <div className="space-y-5">
                            <div>
                              <div className="flex justify-between text-sm font-bold mb-1"><span className="text-slate-500">28天總排班工時</span><span className={isHoursWarning ? 'text-red-600 font-black' : 'text-indigo-600 font-black'}>{r.totalHours28} / 160 hr</span></div>
                              <div className="w-full bg-slate-200 h-3 rounded-full overflow-hidden"><div className={`h-full rounded-full transition-all ${isHoursWarning ? 'bg-red-500' : 'bg-indigo-500'}`} style={{ width: `${Math.min((r.totalHours28 / 160) * 100, 100)}%` }}></div></div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                              <div className="bg-white p-3 rounded-xl border border-slate-200 flex flex-col"><span className="text-xs text-slate-400 mb-1">總休假日數 (底線8天)</span><span className={`text-2xl font-black ${isOffWarning ? 'text-red-600' : 'text-slate-700'}`}>{r.daysOff} <span className="text-sm">天</span></span></div>
                              <div className="bg-white p-3 rounded-xl border border-slate-200 flex flex-col"><span className="text-xs text-slate-400 mb-1">單日最高工時</span><span className={`text-2xl font-black ${isDailyWarning ? 'text-orange-500' : 'text-slate-700'}`}>{r.maxDailyHours} <span className="text-sm">hr</span></span></div>
                            </div>
                          </div>
                        </div>
                      )
                    })}
                  </div>
                </div>
              </div>
            )}
          </main>

          {isSettingsOpen && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-[5000] p-4">
              <div className="bg-white rounded-[3rem] w-full max-w-2xl p-8 shadow-2xl flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center mb-6 shrink-0"><h3 className="text-2xl font-black text-indigo-700 flex items-center gap-2"><DollarSign/> 薪資參數與個人專屬設定</h3><button onClick={() => setIsSettingsOpen(false)} className="text-slate-400 hover:text-black"><X size={28}/></button></div>
                <div className="overflow-y-auto flex-1 pr-2 space-y-8">
                  <div className="space-y-4">
                    <h4 className="text-lg font-black text-slate-800 border-b pb-2">1. 預設基本薪資 <span className="text-sm font-normal text-slate-500">(未設定個人專屬時套用此標準)</span></h4>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200"><label className="block text-slate-500 text-sm font-bold mb-2">PT 預設時薪 (元/hr)</label><input type="number" className="w-full text-xl font-black border-2 border-slate-300 p-2 rounded-xl focus:border-indigo-500 outline-none" value={settings.ptWage} onChange={e => setSettings({...settings, ptWage: Number(e.target.value)})} /></div>
                      <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200"><label className="block text-slate-500 text-sm font-bold mb-2">月薪預設底薪 (元/月)</label><input type="number" className="w-full text-xl font-black border-2 border-slate-300 p-2 rounded-xl focus:border-indigo-500 outline-none" value={settings.monthlyWage} onChange={e => setSettings({...settings, monthlyWage: Number(e.target.value)})} /><p className="text-[10px] text-slate-400 mt-1">*系統會除以 240 小時換算加班費基準</p></div>
                    </div>
                  </div>
                  <div className="space-y-4">
                    <h4 className="text-lg font-black text-slate-800 border-b pb-2">2. 員工個人薪資設定 <span className="text-sm font-normal text-slate-500">(可針對職務/年資獨立設定)</span></h4>
                    <div className="bg-slate-50 rounded-2xl border border-slate-200 p-4 space-y-3">
                      {employees.filter(e => e.base === base).map(emp => (
                        <div key={emp.id} className="flex items-center justify-between bg-white p-3 rounded-xl shadow-sm border border-slate-100 hover:border-indigo-200 transition-colors">
                          <div className="flex items-center gap-3"><span className="font-black text-lg">{emp.name}</span><span className={`text-xs px-2 py-1 rounded-md font-bold ${emp.type === 'PT' ? 'bg-teal-100 text-teal-700' : 'bg-blue-100 text-blue-700'}`}>{emp.type} / {emp.role}</span></div>
                          <div className="flex items-center gap-2"><span className="text-slate-400 text-sm font-bold">$</span><input type="number" placeholder={emp.type === 'PT' ? `預設: ${settings.ptWage}` : `預設: ${settings.monthlyWage}`} className="w-32 text-right font-black border-2 border-slate-200 p-2 rounded-lg focus:border-indigo-500 outline-none bg-slate-50 focus:bg-white transition-all" value={editingWages[emp.id] ?? ''} onChange={e => setEditingWages({...editingWages, [emp.id]: e.target.value})} /></div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="pt-6 border-t mt-4 shrink-0"><button onClick={saveSettings} className="w-full bg-indigo-600 text-white font-black text-xl py-4 rounded-2xl shadow-lg active:scale-95 transition-all">💾 儲存所有薪資設定</button></div>
              </div>
            </div>
          )}
        </div>
      );
    }
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
