<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>泰膳娘 - 出勤考核紅綠燈 (完美對齊版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"
      }
    }
  </script>
  <style>
    @media print {
      /* 💡 縮減邊距至 5mm，讓版面完全伸展，防裁切 */
      @page { size: A4 landscape; margin: 5mm; }
      body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; background: white !important; }
      ::-webkit-scrollbar { display: none !important; }
      .no-print { display: none !important; }
      .print-shadow-none { box-shadow: none !important; border: 1px solid #e5e7eb !important; }
    }
    input[type="time"]::-webkit-calendar-picker-indicator { cursor: pointer; }
    
    /* 💡 終極隱藏捲動條：解決多段班出現捲動條導致右側對齊被往左擠壓的問題 */
    .calendar-cell-scroll::-webkit-scrollbar { display: none; }
    .calendar-cell-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getFirestore, collection, doc, setDoc, onSnapshot, getDoc } from 'firebase/firestore';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { 
      Calendar, Clock, CheckCircle2, ChevronLeft, ChevronRight, 
      UserCheck, FileSpreadsheet, Printer, Search, BarChart3, Edit3, XCircle, Lock, LogOut, Download, CalendarDays, User
    } from 'lucide-react';

    // 🔐 共用泰膳娘雲端金鑰
    const firebaseConfig = {
      apiKey: "AIzaSyCitzdvwC1VEjXq_-ypAVhkeo9aWwuTfQI",
      authDomain: "tsn-shife.firebaseapp.com",
      projectId: "tsn-shife",
      storageBucket: "tsn-shife.firebasestorage.app",
      messagingSenderId: "453632681741",
      appId: "1:453632681741:web:13f163e924e34f2fa2b244"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'tsn-official-app'; 

    // 🚦 紅綠燈 UI 元件 
    const TrafficLight = ({ label, status, diff, type, hideLabel = false }) => {
      let tooltip = '尚未打卡';
      if (status !== 'none' && status) {
        if (type === 'start') tooltip = status === 'green' ? '準時或提早' : `遲到 ${diff} 分鐘`;
        else tooltip = status === 'green' ? '準時或延後下班' : `早退 ${diff} 分鐘`;
      }
      return (
        <div className="flex items-center gap-1.5" title={tooltip}>
          {!hideLabel && <span className="text-xs font-bold text-slate-500 w-8 text-right shrink-0">{label}</span>}
          <div className="inline-flex gap-1 bg-slate-800 p-1.5 rounded-full border-2 border-slate-700 shadow-inner print:border-none print:shadow-none print:bg-transparent print:p-0">
            <div className={`w-3.5 h-3.5 print:w-3 print:h-3 rounded-full transition-all duration-300 ${status === 'red' ? 'bg-red-500 shadow-[0_0_8px_#ef4444] print:border print:border-red-800' : 'bg-red-950 opacity-30 print:bg-gray-200 print:opacity-100 print:border print:border-gray-300'}`}></div>
            <div className={`w-3.5 h-3.5 print:w-3 print:h-3 rounded-full transition-all duration-300 ${status === 'yellow' ? 'bg-yellow-400 shadow-[0_0_8px_#facc15] animate-pulse print:border print:border-yellow-600' : 'bg-yellow-950 opacity-30 print:bg-gray-200 print:opacity-100 print:border print:border-gray-300'}`}></div>
            <div className={`w-3.5 h-3.5 print:w-3 print:h-3 rounded-full transition-all duration-300 ${status === 'green' ? 'bg-green-500 shadow-[0_0_8px_#22c55e] print:border print:border-green-800' : 'bg-green-950 opacity-30 print:bg-gray-200 print:opacity-100 print:border print:border-gray-300'}`}></div>
          </div>
        </div>
      );
    };

    // 🛡️ 入口防護鎖元件
    export default function App() {
      const [user, setUser] = useState(null);
      const [ready, setReady] = useState(false);
      const [role, setRole] = useState('none');
      const [isLoadingAuth, setIsLoadingAuth] = useState(false);

      useEffect(() => {
        signInAnonymously(auth).catch(err => console.error(err));
        return onAuthStateChanged(auth, (u) => { 
          if(u) { setUser(u); setReady(true); } 
        });
      }, []);

      const handleLogin = async () => {
        setIsLoadingAuth(true);
        const pwd = document.getElementById('pwd-input').value;
        let adminPwd = "tsn168"; 
        try {
          const authDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'auth'));
          if (authDoc.exists() && authDoc.data().admin) adminPwd = authDoc.data().admin;
        } catch (e) { console.error(e); }
        
        if (pwd === adminPwd) setRole('admin');
        else alert("密碼錯誤！請輸入最高主管權限密碼。");
        setIsLoadingAuth(false);
      };

      if (!ready) return <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center text-white font-bold animate-pulse"><span className="text-3xl tracking-widest mb-4">泰膳娘金庫連線中...</span></div>;

      if (role === 'none') return (
        <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6 font-sans">
          <div className="bg-white rounded-[3rem] p-12 w-full max-w-md text-center shadow-2xl border-4 border-teal-50 animate-in zoom-in-95">
            <Lock className="mx-auto text-teal-600 mb-6" size={64} />
            <h1 className="text-3xl font-black mb-2 text-slate-800">打卡考核系統</h1>
            <p className="text-slate-500 mb-8 font-bold">人資與店長專用入口</p>
            <input id="pwd-input" type="password" autoFocus placeholder="請輸入主管通行密碼" className="w-full border-4 border-slate-100 p-5 rounded-3xl text-center text-3xl mb-6 focus:border-teal-500 outline-none font-black shadow-inner bg-slate-50" onKeyDown={(e) => { if (e.key === 'Enter') handleLogin(); }} />
            <button onClick={handleLogin} disabled={isLoadingAuth} className="w-full bg-teal-600 text-white py-6 rounded-3xl font-black text-2xl hover:bg-teal-700 transition-colors shadow-2xl active:scale-95 flex justify-center items-center gap-3"><Lock size={28} /> {isLoadingAuth ? '驗證中...' : '解鎖登入'}</button>
          </div>
        </div>
      );

      return <AttendanceApp user={user} onLogout={() => setRole('none')} />;
    }

    // 📋 主系統元件
    function AttendanceApp({ user, onLogout }) {
      const [employees, setEmployees] = useState([]);
      const [shifts, setShifts] = useState([]);
      const [attendances, setAttendances] = useState({});
      const [date, setDate] = useState(new Date());
      const [toast, setToast] = useState('');
      const [view, setView] = useState('daily'); 
      const [filterName, setFilterName] = useState(''); 
      const [selectedEmpId, setSelectedEmpId] = useState(''); 
      const base = localStorage.getItem('tsn_base') || '0931907011';

      useEffect(() => {
        const p = (n) => collection(db, 'artifacts', appId, 'public', 'data', n);
        const u1 = onSnapshot(p('employees'), s => setEmployees(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const u2 = onSnapshot(p('shifts'), s => setShifts(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const u3 = onSnapshot(p('attendances'), s => {
          const acc = {};
          s.docs.forEach(d => { acc[d.id] = d.data(); });
          setAttendances(acc);
        });
        return () => { u1(); u2(); u3(); };
      }, []);

      const fEmployees = useMemo(() => employees.filter(e => e.base === base), [employees, base]);

      useEffect(() => {
        if (fEmployees.length > 0 && !selectedEmpId) {
          setSelectedEmpId(fEmployees[0].id);
        }
      }, [fEmployees, selectedEmpId]);

      const getDayKey = (d) => `${d.getFullYear()}_${d.getMonth() + 1}_${d.getDate()}`;
      const currentDayKey = getDayKey(date);

      // 💡 雙向判定邏輯：上班抓遲到
      const calculateStartStatus = (scheduled, actual) => {
        if (!scheduled || !actual) return { status: 'none', diff: 0 };
        const [sH, sM] = scheduled.split(':').map(Number);
        const [aH, aM] = actual.split(':').map(Number);
        const diffMinutes = (aH * 60 + aM) - (sH * 60 + sM);
        
        if (diffMinutes <= 0) return { status: 'green', diff: diffMinutes }; 
        if (diffMinutes >= 1 && diffMinutes <= 4) return { status: 'yellow', diff: diffMinutes }; 
        return { status: 'red', diff: diffMinutes }; 
      };

      // 💡 雙向判定邏輯：下班抓早退
      const calculateEndStatus = (scheduled, actual) => {
        if (!scheduled || !actual) return { status: 'none', diff: 0 };
        const [sH, sM] = scheduled.split(':').map(Number);
        const [aH, aM] = actual.split(':').map(Number);
        const diffMinutes = (sH * 60 + sM) - (aH * 60 + aM); 
        
        if (diffMinutes <= 0) return { status: 'green', diff: diffMinutes }; 
        if (diffMinutes >= 1 && diffMinutes <= 4) return { status: 'yellow', diff: diffMinutes }; 
        return { status: 'red', diff: diffMinutes }; 
      };

      const todayRecords = useMemo(() => {
        const records = [];
        const todayShifts = shifts.filter(s => s.key === currentDayKey && s.leaveType === 'work' && s.base === base);
        todayShifts.forEach(shift => {
          const emp = fEmployees.find(e => e.id === shift.empId);
          if (!emp) return;
          [1, 2, 3].forEach(n => {
            const start = shift[`shift${n}Start`];
            const end = shift[`shift${n}End`];
            const loc = shift[`shift${n}Loc`];
            if (start && end && loc) {
              const recordId = `${shift.empId}_${currentDayKey}_shift${n}`;
              const savedData = attendances[recordId] || {};
              
              const actualStart = savedData.actualStart || savedData.actualTime || '';
              const actualEnd = savedData.actualEnd || '';
              
              const startResult = calculateStartStatus(start, actualStart);
              const endResult = calculateEndStatus(end, actualEnd);

              records.push({
                id: recordId, empId: emp.id, name: emp.name, role: emp.role, loc: loc,
                segmentName: `第 ${n} 段`, scheduledStart: start, scheduledEnd: end,
                actualStart, actualEnd, 
                startStatus: startResult.status, startDiff: startResult.diff,
                endStatus: endResult.status, endDiff: endResult.diff
              });
            }
          });
        });
        return records.sort((a, b) => a.scheduledStart.localeCompare(b.scheduledStart));
      }, [shifts, fEmployees, attendances, currentDayKey, base]);

      const weekDates = useMemo(() => {
        const d = date.getDay() === 0 ? 7 : date.getDay(); 
        return Array.from({length: 7}, (_, i) => { const x = new Date(date); x.setDate(x.getDate() - d + i + 1); return x; });
      }, [date]);

      const monthDates = useMemo(() => {
        const year = date.getFullYear();
        const month = date.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        return Array.from({length: daysInMonth}, (_, i) => new Date(year, month, i + 1));
      }, [date]);

      const handleTimeChange = async (recordId, type, newTime, empId, dayKey, scheduledStart, scheduledEnd, currentActualStart, currentActualEnd) => {
        let aStart = currentActualStart;
        let aEnd = currentActualEnd;
        
        if (type === 'start') aStart = newTime;
        if (type === 'end') aEnd = newTime;

        const sr = calculateStartStatus(scheduledStart, aStart);
        const er = calculateEndStatus(scheduledEnd, aEnd);

        const dataToSave = { 
          empId, key: dayKey, 
          scheduledStart, scheduledEnd, 
          actualStart: aStart, actualEnd: aEnd, 
          startStatus: sr.status, startDiff: sr.diff,
          endStatus: er.status, endDiff: er.diff,
          base 
        };

        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendances', recordId), dataToSave);
          showToast(`✅ 已自動儲存 ${type==='start'?'上班':'下班'} 打卡紀錄`);
        } catch (e) { console.error("儲存失敗", e); }
      };

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 2000); };

      const downloadBackup = () => {
        const data = { employees, shifts, attendances, backupDate: new Date().toISOString(), type: 'attendance_backup' };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url;
        a.download = `泰膳娘_打卡紀錄備份_${currentDayKey}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        showToast("📥 備份下載完成！");
      };

      const exportToExcel = (exportView) => {
        let csvContent = '\uFEFF'; 
        csvContent += "日期,星期,員工姓名,據點,排班時段,預定上班,預定下班,實際上班打卡,上班狀態,上班誤差(分),實際下班打卡,下班狀態,下班誤差(分)\n";
        
        const weekMap = ['日', '一', '二', '三', '四', '五', '六'];
        const targetDates = (exportView === 'monthly' || exportView === 'personal') ? monthDates : weekDates;
        
        const empsToExport = exportView === 'personal' 
          ? fEmployees.filter(emp => emp.id === selectedEmpId)
          : fEmployees.filter(emp => !filterName || emp.name.includes(filterName));

        empsToExport.forEach(emp => {
          targetDates.forEach(d => {
            const dKey = getDayKey(d);
            const shift = shifts.find(s => s.empId === emp.id && s.key === dKey && s.leaveType === 'work');
            if (shift) {
              const dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
              const dayStr = `星期${weekMap[d.getDay()]}`;
              [1, 2, 3].forEach(n => {
                const start = shift[`shift${n}Start`];
                const end = shift[`shift${n}End`];
                const loc = shift[`shift${n}Loc`];
                if (start && end && loc) {
                  const recordId = `${emp.id}_${dKey}_shift${n}`;
                  const att = attendances[recordId] || {};
                  
                  const aStart = att.actualStart || att.actualTime || '';
                  const aEnd = att.actualEnd || '';
                  
                  const sStatus = att.startStatus === 'green' ? '準時或提早' : att.startStatus === 'yellow' ? '輕微遲到' : att.startStatus === 'red' ? '嚴重遲到' : '無紀錄';
                  const eStatus = att.endStatus === 'green' ? '準時或延後' : att.endStatus === 'yellow' ? '輕微早退' : att.endStatus === 'red' ? '嚴重早退' : '無紀錄';
                  
                  const sDiff = att.startStatus === 'none' || !att.startStatus ? '' : att.startDiff;
                  const eDiff = att.endStatus === 'none' || !att.endStatus ? '' : att.endDiff;

                  csvContent += `${dateStr},${dayStr},${emp.name},${loc},第${n}段,${start},${end},${aStart},${sStatus},${sDiff},${aEnd},${eStatus},${eDiff}\n`;
                }
              });
            }
          });
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        
        const fileName = exportView === 'monthly' 
          ? `泰膳娘_全體月考核表_${date.getFullYear()}年${date.getMonth()+1}月.csv` 
          : exportView === 'personal'
          ? `泰膳娘_個人月考核表_${fEmployees.find(e=>e.id===selectedEmpId)?.name}_${date.getFullYear()}年${date.getMonth()+1}月.csv`
          : `泰膳娘_週考核表_${weekDates[0].getMonth()+1}月.csv`;
        
        link.setAttribute("download", fileName);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      return (
        <div className="min-h-screen flex flex-col font-black selection:bg-teal-200">
          {toast && (
            <div className="fixed top-8 left-1/2 -translate-x-1/2 z-[9999] bg-teal-800 text-white px-8 py-4 rounded-full flex items-center gap-3 shadow-2xl animate-in slide-in-from-top-4 print:hidden">
              <span className="tracking-widest text-lg">{toast}</span>
            </div>
          )}

          <nav className="bg-white p-4 md:p-6 shadow-md flex flex-col md:flex-row justify-between items-center sticky top-0 z-40 border-b-4 border-teal-600 print:hidden gap-3 shrink-0">
            <div className="flex items-center gap-3 shrink-0 w-full md:w-auto justify-center md:justify-start">
              <div className="p-2.5 bg-teal-600 rounded-2xl text-white shadow-lg"><UserCheck size={28}/></div>
              <div>
                <h1 className="text-2xl font-black text-slate-800">打卡與考核系統</h1>
                <div className="text-[10px] md:text-sm text-slate-500 mt-0.5">店鋪據點: {base}</div>
              </div>
            </div>
            
            <div className="flex items-center gap-3 flex-wrap w-full md:w-auto justify-center">
              <div className="flex bg-slate-100 p-1.5 md:p-2 rounded-xl shadow-inner border border-slate-200 overflow-x-auto max-w-full">
                <button onClick={() => setView('daily')} className={`px-3 md:px-5 py-2 md:py-2.5 rounded-lg text-sm md:text-lg transition-all whitespace-nowrap ${view==='daily'?'bg-white text-teal-700 shadow-md':'text-slate-500 hover:text-teal-600'}`}>📝 每日</button>
                <button onClick={() => setView('weekly')} className={`px-3 md:px-5 py-2 md:py-2.5 rounded-lg text-sm md:text-lg transition-all whitespace-nowrap ${view==='weekly'?'bg-white text-teal-700 shadow-md':'text-slate-500 hover:text-teal-600'}`}>📊 週表</button>
                <button onClick={() => setView('monthly')} className={`px-3 md:px-5 py-2 md:py-2.5 rounded-lg text-sm md:text-lg transition-all whitespace-nowrap ${view==='monthly'?'bg-white text-teal-700 shadow-md':'text-slate-500 hover:text-teal-600'}`}>📅 全體月</button>
                <button onClick={() => setView('personal')} className={`px-3 md:px-5 py-2 md:py-2.5 rounded-lg text-sm md:text-lg transition-all whitespace-nowrap ${view==='personal'?'bg-white text-teal-700 shadow-md':'text-slate-500 hover:text-teal-600'}`}>👤 個人專屬</button>
              </div>

              <div className="flex items-center gap-1.5 md:gap-2 bg-slate-100 p-1.5 md:p-2 rounded-xl shadow-inner border border-slate-200">
                <button onClick={() => setDate(new Date(date.getFullYear(), date.getMonth(), date.getDate() - 1))} className="p-1.5 md:p-2 hover:bg-white rounded-lg transition-colors z-10 relative"><ChevronLeft size={20}/></button>
                
                <div className="relative flex items-center gap-1.5 px-2 md:px-4 cursor-pointer text-teal-700 hover:text-teal-600 bg-white py-1 rounded-lg shadow-sm overflow-hidden">
                  <Calendar size={18} />
                  <span className="text-sm md:text-xl font-black">{date.getFullYear()}/{date.getMonth() + 1}/{date.getDate()}</span>
                  <input type="date" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" value={`${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`} onChange={(e) => { if(e.target.value) { const [y, m, d] = e.target.value.split('-'); setDate(new Date(y, m - 1, d)); } }} />
                </div>
                
                <button onClick={() => setDate(new Date(date.getFullYear(), date.getMonth(), date.getDate() + 1))} className="p-1.5 md:p-2 hover:bg-white rounded-lg transition-colors z-10 relative"><ChevronRight size={20}/></button>
                
                <button onClick={downloadBackup} className="ml-1 p-1.5 md:p-2 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-lg transition-colors shadow-inner flex items-center gap-1 font-bold z-10 relative" title="下載資料備份"><Download size={18}/></button>
                <button onClick={onLogout} className="p-1.5 md:p-2 bg-red-50 text-red-600 hover:bg-red-100 rounded-lg transition-colors shadow-inner flex items-center gap-1 font-bold z-10 relative" title="登出系統"><LogOut size={18}/></button>
              </div>
            </div>
          </nav>

          <main className="flex-1 w-full max-w-[1600px] mx-auto p-4 md:p-6 print:p-0">
            {view === 'daily' && (
              <div className="bg-white rounded-3xl md:rounded-[3rem] shadow-2xl border-2 border-slate-100 overflow-hidden animate-in fade-in zoom-in-95">
                <div className="bg-slate-800 text-white p-4 md:p-6 flex flex-col md:flex-row justify-between items-center gap-3">
                  <h2 className="text-xl md:text-2xl font-black flex items-center gap-2 md:gap-3"><Edit3 className="text-teal-400 w-6 md:w-8"/> 實際打卡輸入區 (自動即時存檔)</h2>
                  <div className="flex gap-2 md:gap-4 text-[10px] md:text-xs font-bold bg-slate-900 px-3 md:px-4 py-2 md:py-2.5 rounded-full shadow-inner border border-slate-700 flex-wrap justify-center">
                    <span className="flex items-center gap-1.5 text-green-400"><div className="w-2.5 h-2.5 bg-green-500 rounded-full shadow-[0_0_5px_#22c55e]"></div> 準時/優良</span>
                    <span className="flex items-center gap-1.5 text-yellow-400"><div className="w-2.5 h-2.5 bg-yellow-400 rounded-full shadow-[0_0_5px_#facc15]"></div> 誤差 1~4分</span>
                    <span className="flex items-center gap-1.5 text-red-400"><div className="w-2.5 h-2.5 bg-red-500 rounded-full shadow-[0_0_5px_#ef4444]"></div> 誤差 5分以上</span>
                  </div>
                </div>

                {todayRecords.length === 0 ? (
                  <div className="p-10 md:p-20 text-center text-slate-400 text-xl md:text-2xl font-black flex flex-col items-center gap-4">

                      const records = [];
                      if (shift) {
                        [1, 2, 3].forEach(n => {
                          const start = shift[`shift${n}Start`];
                          const end = shift[`shift${n}End`];
                          if (start && end) {
                            const att = attendances[`${selectedEmpId}_${dKey}_shift${n}`] || {};
                            records.push({
                              start, end, loc: shift[`shift${n}Loc`],
                              aStart: att.actualStart || att.actualTime || '',
                              aEnd: att.actualEnd || '',
                              startStatus: att.startStatus, endStatus: att.endStatus,
                              startDiff: att.startDiff, endDiff: att.endDiff
                            });
                          }
                        });
                      }

                      const now = new Date();
                      const isToday = now.getFullYear() === d.getFullYear() && now.getMonth() === d.getMonth() && now.getDate() === d.getDate();

                      return (
                        <div key={i} className={`border-2 print:border-gray-300 print:border rounded-xl print:rounded-sm p-1 print:p-[1px] flex flex-col min-h-0 transition-all hover:border-teal-300 shadow-sm print:shadow-none overflow-hidden ${isToday ? 'border-teal-400 bg-teal-50/30 print:bg-transparent' : 'border-slate-100 bg-white'}`}>
                          <div className="flex justify-between items-center border-b print:border-gray-300 shrink-0 mb-0.5 print:mb-0 pb-0.5 print:pb-0">
                            {/* 💡 日期字體縮小留白，但字體依然大 */}
                            <span className={`text-base lg:text-lg print:text-[14px] font-black leading-none ${isToday ? 'text-teal-600' : 'text-slate-600 print:text-black'}`}>{d.getDate()}</span>
                          </div>
                          
                          <div className="flex-1 flex flex-col gap-0.5 print:gap-[1px] mt-0.5 print:mt-0 overflow-y-auto print:overflow-hidden calendar-cell-scroll">
                            {records.length > 0 ? records.map((r, idx) => (
                              <div key={idx} className="bg-slate-50 print:bg-white border border-slate-200 print:border-gray-300 rounded-md p-0.5 print:p-0 shadow-sm print:shadow-none flex flex-col gap-0.5 print:gap-[1px]">
                                {/* 💡 班別內容字體全面放大，壓縮行距 */}
                                <div className="text-[10px] lg:text-[11px] print:text-[11px] font-bold text-slate-600 print:text-black text-center bg-white print:bg-slate-100 rounded border border-slate-200 print:border-gray-300 py-0 px-1 truncate leading-none">
                                  {r.loc} {r.start}-{r.end}
                                </div>
                                <div className="flex justify-between items-center bg-orange-50/50 print:bg-transparent rounded px-1 py-0 print:px-1">
                                   <span className="text-[9px] lg:text-[10px] print:text-[11px] text-slate-500 font-bold shrink-0 w-3 print:w-3 leading-none">上</span>
                                   <span className="text-[10px] lg:text-xs print:text-[13px] font-black text-orange-600 print:text-black tracking-wider flex-1 text-center leading-none">{r.aStart || '--:--'}</span>
                                   {/* 💡 使用原生 sm 紅綠燈組件，不再用 scale 導致裁切 */}
                                   <div className="shrink-0"><TrafficLight status={r.startStatus || 'none'} diff={r.startDiff} type="start" hideLabel={true} size="sm" /></div>
                                </div>
                                <div className="flex justify-between items-center bg-teal-50/50 print:bg-transparent rounded px-1 py-0 print:px-1">
                                   <span className="text-[9px] lg:text-[10px] print:text-[11px] text-slate-500 font-bold shrink-0 w-3 print:w-3 leading-none">下</span>
                                   <span className="text-[10px] lg:text-xs print:text-[13px] font-black text-teal-600 print:text-black tracking-wider flex-1 text-center leading-none">{r.aEnd || '--:--'}</span>
                                   {/* 💡 使用原生 sm 紅綠燈組件，不再用 scale 導致裁切 */}
                                   <div className="shrink-0"><TrafficLight status={r.endStatus || 'none'} diff={r.endDiff} type="end" hideLabel={true} size="sm" /></div>
                                </div>
                              </div>
                            )) : (
                              <div className="flex-1 flex items-center justify-center opacity-30">
                                {/* 💡 休假標籤 */}
                                <span className="text-2xl lg:text-3xl print:text-2xl font-black text-slate-400 print:text-gray-400 leading-none">休</span>
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
