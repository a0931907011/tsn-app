      const [base, setBase] = useState(() => localStorage.getItem('tsn_base') || '0931907011');
      const { lsEmps, lsShifts, lsEvents } = useMemo(() => initializeLocalData(), []);
      
      const [employees, setEmployees] = useState(lsEmps);
      const [shifts, setShifts] = useState(lsShifts);

      useEffect(() => { if (!isAdmin && locFilter === 'е…ЁйғЁ') setLocFilter('йә»иұҶ'); }, [isAdmin, locFilter]);

      useEffect(() => {

      const triggerToast = () => { setToast(true); setTimeout(() => setToast(false), 2000); };
      const handlePrint = () => { window.print(); };

      const handleExportExcel = () => {
        let csv = '\uFEFFж—Ҙжңҹ,жҳҹжңҹ,е§“еҗҚ,еҙ—дҪҚ,еҮәеӢӨзӢҖж…Ӣ,ең°й»һж®өдёҖ,жҷӮй–“ж®өдёҖ,ең°й»һж®өдәҢ,жҷӮй–“ж®өдәҢ,ең°й»һж®өдёү,жҷӮй–“ж®өдёү\n';
        const y = date.getFullYear(); const m = date.getMonth();
        const days = new Date(y, m + 1, 0).getDate();
        const weekMap = ['ж—Ҙ', 'дёҖ', 'дәҢ', 'дёү', 'еӣӣ', 'дә”', 'е…ӯ'];
        for (let d = 1; d <= days; d++) {
          const currentD = new Date(y, m, d); const key = getDayKey(currentD); const dow = weekMap[currentD.getDay()];

                const s1 = `${s.shift1Loc||''}${s.shift1Station?`(${s.shift1Station})`:''}${s.shift1Note?`[${s.shift1Note}]`:''}`;

                r += `еҮәеӢӨ,${s1},${s.shift1Start||''}-${s.shift1End||''},${s2},${s.shift2Start||''}-${s.shift2End||''},${s3},${s.shift3Start||''}-${s.shift3End||''}`;

              csv += r + "\n";
            }
          });
        }
        const b = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); const url = URL.createObjectURL(b);
        const l = document.createElement("a"); l.href = url; l.download = `жі°иҶіеЁҳ_${y}е№ҙ${m+1}жңҲ_жҺ’зҸӯиЎЁ.csv`;
        document.body.appendChild(l); l.click(); document.body.removeChild(l);
      };

      const weekDates = useMemo(() => { const d = date.getDay() === 0 ? 7 : date.getDay(); return Array.from({length: 7}, (_, i) => { const x = new Date(date); x.setDate(x.getDate() - d + i + 1); return x; }); }, [date]);
      const timeSlots = Array.from({ length: 30 }, (_, i) => { const val = 7 + (i * 0.5); return { val: val, label: val % 1 === 0 ? String(val) : String(val) }; });
      const getShiftObj = (empId, tDate) => fShifts.find(sh => sh.empId === empId && sh.key === getDayKey(tDate));
      const offEmployeesToday = useMemo(() => fEmployees.map(emp => { const s = getShiftObj(emp.id, date); return (s && s.leaveType && s.leaveType !== 'work') ? { name: emp.name, type: s.leaveType } : null; }).filter(Boolean), [fEmployees, fShifts, date]);
      const currentDailyEvent = fEvents.find(v => v.key === getDayKey(date));

      const hasValidShiftAtLocation = (s, targetLoc) => {
        if (!s || s.leaveType !== 'work') return false;

      const saveToCloudAndLocal = async (type, id, data) => {
        try {
          if (type === 'employee') { const n = data ? [...employees.filter(e => e.id !== id), {id, ...data}] : employees.filter(e => e.id !== id); setEmployees(n); localStorage.setItem('tsn_emp', JSON.stringify(n)); }
          else if (type === 'shift') { const n = data ? [...shifts.filter(s => s.id !== id), {id, ...data}] : shifts.filter(s => s.id !== id); setShifts(n); localStorage.setItem('tsn_shifts', JSON.stringify(n)); }
          else if (type === 'event') { const n = data ? [...events.filter(v => v.id !== id), {id, ...data}] : events.filter(v => v.id !== id); setEvents(n); localStorage.setItem('tsn_events', JSON.stringify(n)); }

        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            let content = e.target.result;
            if (content.charCodeAt(0) === 0xFEFF) content = content.slice(1);
            const res = JSON.parse(content);
            if (!res || (!res.employees && !res.shifts)) throw new Error("з„Ўж•ҲжӘ”жЎҲ");
            
            if (res.employees) {
              const emps = res.employees.map(x => ({...x, base}));
              setEmployees(emps); localStorage.setItem('tsn_emp', JSON.stringify(emps));
              emps.forEach(emp => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employees', emp.id), emp).catch(e=>{}));
            }
            if (res.shifts) {
              const shs = res.shifts.map(x => ({...x, base}));
              setShifts(shs); localStorage.setItem('tsn_shifts', JSON.stringify(shs));
              shs.forEach(s => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shifts', s.id || `${s.empId}_${s.key}`), s).catch(e=>{}));
            }
            if (res.events) {
              const evs = res.events.map(x => ({...x, base}));
              setEvents(evs); localStorage.setItem('tsn_events', JSON.stringify(evs));
              evs.forEach(v => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', v.id || `event_${v.key}`), v).catch(e=>{}));

            <option value="зӮё+з §пјҲдё»е»ҡиӘҝй…Қпјү" />
            <option value="ж№Ҝ+з §пјҲдё»е»ҡиӘҝй…Қпјү" />

                            <td className="text-slate-600 font-black text-2xl">
                                {emp.role}
                                {isWork && segments.length > 0 && <span className="block text-lg text-slate-400 mt-1">({segments[0].loc})</span>}
                            </td>
                            <td className="border-r-2 border-slate-300 print:border-black font-mono">
                              <div className="flex flex-col items-center justify-center gap-2 h-full py-2">
                                  {segments.length > 0 ? segments.map((seg, idx) => (
                                    <div key={idx} className="leading-tight flex flex-col items-center">
                                      <span className={`text-xl font-black text-black ${seg.subName ? "text-red-600 line-through" : ""}`}>{seg.loc} {seg.start}-{seg.end}</span>
                                      
                                      {/* рҹ’Ў е·ҰеҒҙж–Үеӯ—еҙ—дҪҚ/еӮҷиЁ»пјҡдә®й»ғеә• + зҙ…иүІзІ—жЎҶ + й»‘иүІеӨ§еӯ—й«” */}
                                      {(seg.station || seg.note) && (
                                          <div className="flex flex-col gap-1 mt-1">
                                              {seg.station && <span className="bg-yellow-300 text-black border-[3px] border-red-600 px-3 py-1 rounded-lg font-black text-xl shadow-md">{seg.station}</span>}
                                              {seg.note && <span className="bg-yellow-300 text-black border-[3px] border-red-600 px-3 py-1 rounded-lg font-black text-xl shadow-md">{seg.note}</span>}
                                          </div>
                                      )}
                                      
                                      {seg.subName && <div className="text-red-600 text-sm font-black mt-1 bg-white px-2 py-0.5 rounded shadow">з”ұ {seg.subName} д»Ј</div>}
                                    </div>
                                  )) : <span className="text-slate-400 text-xl font-black">{infoStr}</span>}
                              </div>
                            </td>
                            {timeSlots.map((slot, i) => {
                              const cellData = slotLocations.get(slot.val);
                              const subName = slotSubs.get(slot.val);
                              let bgColor = '';
                              
                              if (cellData && cellData.loc) {
                                if (cellData.loc.includes('е…ӯз”І')) bgColor = 'bg-[#4ade80]'; 
                                else if (cellData.loc.includes('йә»иұҶ')) bgColor = 'bg-[#a855f7]'; 
                                else bgColor = 'bg-blue-400';
                              }

                              return (
                                // рҹ’Ў й—ңйҚөдҝ®еҫ©пјҡйҖҷиЈЎеҠ дёҠдәҶ relativeпјҢйҳІжӯўеӯ—й«”йЈ„з§»пјҒ
                                <td key={i} className={`${bgColor} relative p-0 ${slot.val % 1 === 0 ? 'border-l-2 border-slate-300' : 'border-l border-slate-200/50'}`}>
                                   
                                   {/* рҹ’Ў жҷӮй–“и»ёе…§еӯ—й«”жҘөйҷҗж”ҫеӨ§пјҢдёҰеҠ дёҠй»‘иүІз«Ӣй«”йҷ°еҪұ */}
                                   {cellData && cellData.isStart && (
                                      <div className="absolute inset-y-0 left-0 w-max z-20 flex flex-col justify-center pl-3 pr-8 pointer-events-none">
                                          <span className="text-[28px] font-black text-white drop-shadow-[0_2px_2px_rgba(0,0,0,1)] tracking-widest">{cellData.loc}</span>
                                          
                                          {(cellData.station || cellData.note) && (
                                              <div className="flex flex-col gap-1 mt-1">
                                                  {cellData.station && <span className="text-[20px] font-black text-yellow-300 drop-shadow-[0_2px_2px_rgba(0,0,0,1)]">{cellData.station}</span>}
                                                  {cellData.note && <span className="text-[18px] font-black text-yellow-300 drop-shadow-[0_2px_2px_rgba(0,0,0,1)]">({cellData.note})</span>}
                                              </div>
                                          )}
                                      </div>
                                   )}
                                </td>
                              );
                            })}
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* иҰ–ең– 3: зҮҹйҒӢжңҲжӣҶ */}
            {view === 'monthly' && (
              <div className="bg-white rounded-3xl print:rounded-none shadow-xl print:shadow-none border print:border-none border-slate-200 overflow-hidden flex flex-col max-h-[75vh] md:max-h-[80vh] print:max-h-none">
                <div className="grid grid-cols-7 bg-slate-800 print:bg-slate-200 text-white print:text-black text-xs tracking-widest text-center py-4 uppercase shrink-0 sticky top-0 z-20 shadow-md">
                  {['MON','TUE','WED','THU','FRI','SAT','SUN'].map(d => <div key={d}>{d}</div>)}
                </div>
                <div className="grid grid-cols-7 overflow-y-auto flex-1 print:overflow-visible calendar-cell-scroll">
                  {Array.from({ length: (new Date(date.getFullYear(), date.getMonth(), 1).getDay() + 6) % 7 }).map((_, i) => <div key={i} className="h-[120px] md:h-[150px] lg:h-[160px] bg-slate-50/50 border-r border-b" />)}
                  {Array.from({ length: new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate() }).map((_, i) => {
                    const day = i + 1; const k = getDayKey(new Date(date.getFullYear(), date.getMonth(), day));
                    const ev = fEvents.find(v => v.key === k);
                    return (
                      <div key={day} onClick={() => { setDate(new Date(date.getFullYear(), date.getMonth(), day)); setView('daily'); }} className="h-[120px] md:h-[150px] lg:h-[160px] p-2 md:p-3 border-r border-b hover:bg-orange-50/40 cursor-pointer relative group flex flex-col">
                        <div className="flex justify-between items-start mb-1 shrink-0">
                          <span className="text-lg md:text-xl font-sans font-black">{day}</span>
                          {isAdmin && <button onClick={(e) => { e.stopPropagation(); setEEvent({ day, text: ev?.text || "" }); }} className="p-1 text-slate-200 group-hover:text-orange-500 no-print"><Tag size={16}/></button>}
                        </div>
                        <div className="flex-1 overflow-y-auto calendar-cell-scroll pr-1">{renderEvents(ev?.text)}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </main>

          {/* еҪҲзӘ—жЁЎзө„ */}
          <div className="print:hidden">
            {/* дёҠеӮійӮ„еҺҹжЁЎзө„ */}
            {mBackup && (
              <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-xl flex items-center justify-center z-[6000] p-6 font-black font-sans">
                <div className="bg-white rounded-[3rem] w-full max-w-2xl p-10 shadow-2xl animate-in zoom-in-95">
                  <div className="flex justify-between items-center mb-8"><h3 className="text-3xl"><Shield className="inline mr-2 text-blue-600"/>еӮҷд»ҪиҲҮйӮ„еҺҹ</h3><button onClick={() => setMBackup(false)} className="p-3 bg-slate-100 rounded-full"><X/></button></div>
                  
                  <div className="bg-orange-50 p-8 rounded-2xl relative border-4 border-orange-100 mb-6">
                    <h4 className="text-2xl text-orange-800 mb-4">рҹ“Ҙ з¬¬дёҖжӯҘпјҡи®ҖеҸ–жӮЁзҡ„еӮҷд»ҪжӘ”</h4>
                    <input type="file" accept=".json" ref={fileInputRef} onChange={handleUploadRestore} className="hidden" />
                    <button onClick={() => fileInputRef.current.click()} className="w-full py-6 bg-orange-600 text-white rounded-xl text-2xl shadow-lg"><Upload className="inline mr-2"/>дёҠеӮіеӮҷд»ҪжӘ”жЎҲдёҰйӮ„еҺҹ</button>
                    <p className="text-center text-sm text-orange-800 mt-4">рҹ‘ү й»һж“ҠдёҠж–№жҢүйҲ•пјҢйҒёеҸ–жӮЁйӣ»и…ҰиЈЎзҡ„ .json еӮҷд»ҪжӘ”еҚіеҸҜпјҒ</p>
                  </div>
                  
                  <div className="bg-slate-100 p-6 rounded-2xl">
                    <button onClick={handleDownloadBackup} className="w-full py-4 bg-slate-800 text-white rounded-xl text-xl shadow-lg"><Download className="inline mr-2"/>дёӢијүеӮҷд»Ҫ (.json)</button>
                  </div>
                </div>
              </div>
            )}

            {/* еӨҘдјҙз®ЎзҗҶ */}
            {mHR && (
              <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center z-[5000] p-4 font-black font-sans">
                <div className="bg-white rounded-3xl w-full max-w-7xl h-[85vh] flex flex-col shadow-2xl">
                  <div className="bg-slate-900 p-6 text-white flex justify-between items-center"><h3 className="text-2xl"><Users2 className="inline mr-2"/>еӨҘдјҙиіҮж–ҷеә«</h3><button onClick={() => setMHR(false)}><X/></button></div>
                  <div className="flex-1 grid grid-cols-12 overflow-hidden">
                    <div className="col-span-4 p-8 bg-slate-50 border-r-4">
                      <input className="w-full border-2 p-3 mb-4 rounded-xl" placeholder="е§“еҗҚ" value={hrForm.name} onChange={e => setHrForm({...hrForm, name: e.target.value})} />
                      <select className="w-full border-2 p-3 mb-4 rounded-xl" value={hrForm.type} onChange={e => setHrForm({...hrForm, type: e.target.value})}><option>жңҲи–Ә</option><option>PT</option></select>
                      <select className="w-full border-2 p-3 mb-4 rounded-xl" value={hrForm.role} onChange={e => setHrForm({...hrForm, role: e.target.value})}><option>дё»е»ҡ</option><option>ж©ҹеӢ•дәәе“Ў</option><option>ж«ғеҸ°</option><option>зӮёеҸ°</option><option>ж№ҜеҸ°</option></select>
                      <button onClick={async () => { if(!hrForm.name) return; saveToCloudAndLocal('employee', hrForm.id || `emp_${Date.now()}`, { name: hrForm.name, type: hrForm.type, role: hrForm.role, base }); setHrForm({id:null, name:'', type:'жңҲи–Ә', role:'дё»е»ҡ'}); triggerToast(); }} className="w-full py-4 bg-orange-600 text-white rounded-xl text-xl">рҹ’ҫ е„Іеӯҳ</button>
                    </div>
                    <div className="col-span-8 p-8 overflow-y-auto grid grid-cols-2 gap-4 content-start">
                      {fEmployees.map(e => (
                        <div key={e.id} className="p-5 border-2 rounded-2xl flex justify-between items-center shadow-sm">
                          <div><div className="text-xl font-black">{e.name} <span className="text-xs bg-blue-500 text-white px-2 py-1 rounded">{e.type}</span></div></div>
                          <div className="flex gap-2"><button onClick={() => setHrForm({ id: e.id, name: e.name, type: e.type, role: e.role })} className="p-3 bg-blue-50 rounded-xl"><Edit3/></button><button onClick={() => { if(window.confirm('еҲӘйҷӨ?')) saveToCloudAndLocal('employee', e.id, null); }} className="p-3 bg-red-50 rounded-xl text-red-500"><Trash2/></button></div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* рҹ’Ў жҺ’зҸӯз·ЁијҜ (5ж јпјҡж“ҡй»һгҖҒдёҠзҸӯгҖҒдёӢзҸӯгҖҒеҙ—дҪҚгҖҒеӮҷиЁ») */}
            {eShift && (
              <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-2xl flex items-center justify-center z-[5000] p-6 font-black font-sans">
                <div className="bg-white rounded-[3rem] w-full max-w-4xl max-h-[90vh] flex flex-col shadow-2xl">
                  <div className="bg-orange-600 p-6 text-white flex justify-between items-center"><h3 className="text-2xl"><Clock className="inline mr-2"/>жҺ’зҸӯ ({fEmployees.find(e=>e.id===eShift.empId)?.name})</h3><button onClick={() => setEShift(null)}><X/></button></div>
                  <div className="p-8 overflow-y-auto space-y-6 flex-1 bg-slate-50">
                    <div className="grid grid-cols-4 gap-4">
                      {['work', 'off', 'annual', 'sick', 'schedule_off', 'madou_off', 'liujia_off'].map(id => (
                        <button key={id} onClick={() => setEShift({...eShift, leaveType: id})} className={`py-4 rounded-xl border-2 text-lg ${eShift.leaveType===id ? 'border-orange-600 text-orange-600 bg-white shadow-2xl scale-105':'border-slate-200 text-slate-400 bg-white'}`}>{id==='work'?'еҮәеӢӨ':id==='off'?'дј‘еҒҮ':id==='schedule_off'?'жҺ’дј‘':id==='madou_off'?'йә»иұҶеә—дј‘':id==='liujia_off'?'е…ӯз”Іеә—дј‘':id==='annual'?'зү№дј‘':'з—…еҒҮ'}</button>
                      ))}
                    </div>
                    {eShift.leaveType === 'work' && (
                      <>
                        <div className="bg-orange-50 p-6 rounded-2xl flex gap-2 flex-wrap">
                          <button onClick={() => applyShiftTemplate('full')} className="px-4 py-2 bg-orange-600 text-white rounded-lg">жңҲи–Әе…ЁзҸӯ</button>
                          <button onClick={() => applyShiftTemplate('morning')} className="px-4 py-2 bg-orange-500 text-white rounded-lg">ж—©зҸӯ</button>
                          <button onClick={() => applyShiftTemplate('evening')} className="px-4 py-2 bg-indigo-500 text-white rounded-lg">жҷҡзҸӯ</button>
                          <button onClick={() => applyShiftTemplate('pt_a')} className="px-4 py-2 bg-teal-500 text-white rounded-lg">PTеҚҲзҸӯ</button>
                          <button onClick={() => applyShiftTemplate('pt_b')} className="px-4 py-2 bg-blue-500 text-white rounded-lg">PTжҷҡзҸӯ</button>
                          <button onClick={() => applyShiftTemplate('clear')} className="px-4 py-2 bg-slate-300 rounded-lg">жё…з©ә</button>
                        </div>
                        {[1, 2, 3].map(n => (
                          <div key={n} className="p-6 bg-white rounded-2xl shadow-sm border-2">
                            <div className="flex justify-between items-center mb-4"><span className="text-orange-600">з¬¬ {n} ж®өзҸӯ</span><select value={eShift[`shift${n}SubId`]||''} onChange={e=>setEShift({...eShift,[`shift${n}SubId`]:e.target.value})} className="border p-1 rounded"><option value="">жң¬дәәеҮәеӢӨ</option>{fEmployees.filter(emp=>emp.id!==eShift.empId).map(e=><option key={e.id} value={e.id}>{e.name}д»Ј</option>)}</select></div>
                            
                            <div className="flex flex-col md:flex-row gap-3">
                               <div className="flex flex-col gap-1 w-full md:w-24 shrink-0">
                                   <label className="text-[10px] text-slate-400">ж“ҡй»һ</label>
                                   <select value={eShift[`shift${n}Loc`]||'йә»иұҶ'} onChange={e=>setEShift({...eShift,[`shift${n}Loc`]:e.target.value})} className="border-2 p-2.5 rounded-xl text-lg font-black outline-none"><option>йә»иұҶ</option><option>е…ӯз”І</option><option>иҢӮиҝӘ</option><option>йӨҗи»Ҡ</option></select>
                               </div>
                               <div className="flex flex-col gap-1 w-full md:w-28 shrink-0">
                                   <label className="text-[10px] text-slate-400">дёҠзҸӯ</label>
                                   <input type="time" value={eShift[`shift${n}Start`]||''} onChange={e=>setEShift({...eShift,[`shift${n}Start`]:e.target.value})} className="border-2 p-2.5 rounded-xl text-lg font-black font-mono outline-none"/>
                               </div>
                               <div className="flex flex-col gap-1 w-full md:w-28 shrink-0">
                                   <label className="text-[10px] text-slate-400">дёӢзҸӯ</label>
                                   <input type="time" value={eShift[`shift${n}End`]||''} onChange={e=>setEShift({...eShift,[`shift${n}End`]:e.target.value})} className="border-2 p-2.5 rounded-xl text-lg font-black font-mono outline-none"/>
                               </div>
                               <div className="flex flex-col gap-1 w-full flex-1">
                                   <label className="text-[10px] text-blue-600">жүӢеӢ•еҙ—дҪҚ(йҒёеЎ«)</label>
                                   <input type="text" list="station-options" placeholder="йҒёеЎ«" value={eShift[`shift${n}Station`]||''} onChange={e=>setEShift({...eShift,[`shift${n}Station`]:e.target.value})} className="border-2 border-blue-200 bg-blue-50 focus:bg-white p-2.5 rounded-xl text-lg font-black text-blue-800 outline-none"/>
                               </div>
                               <div className="flex flex-col gap-1 w-full flex-1">
                                   <label className="text-[10px] text-slate-500">ж–Үеӯ—еӮҷиЁ»(йҒёеЎ«)</label>
                                   <input type="text" placeholder="йҒёеЎ«" value={eShift[`shift${n}Note`]||''} onChange={e=>setEShift({...eShift,[`shift${n}Note`]:e.target.value})} className="border-2 border-slate-200 bg-slate-50 focus:bg-white p-2.5 rounded-xl text-lg font-black text-slate-700 outline-none"/>
                               </div>
                            </div>
                          </div>
                        ))}
                      </>
                    )}
                  </div>
                  <div className="p-6 bg-white"><button onClick={() => { saveToCloudAndLocal('shift', `${eShift.empId}_${eShift.key}`, {...eShift, base}); setEShift(null); triggerToast(); }} className="w-full py-6 bg-orange-600 text-white rounded-2xl text-2xl font-black shadow-lg hover:scale-[1.02] active:scale-95 transition-all">рҹ’ҫ е„ІеӯҳжҺ’зҸӯ</button></div>
                </div>
              </div>
            )}

            {/* зҮҹйҒӢиЁҳдәӢ */}
            {eEvent && (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[5500] p-6 font-black font-sans">
                <div className="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl animate-in zoom-in-95 border-4 border-white/20">
                  <div className="flex justify-between items-center mb-4"><h3 className="text-2xl text-orange-600">иЁҳдәӢиЁӯе®ҡ</h3><button onClick={() => setEEvent(null)} className="text-slate-400 hover:text-black"><X/></button></div>
                  <textarea id="et-box" className="w-full border-4 p-4 rounded-xl h-48 text-xl outline-none focus:border-orange-500 bg-slate-50" defaultValue={eEvent.text} placeholder="дҫӢеҰӮпјҡе…ӯз”Іеә—дј‘" />
                  <button onClick={() => { const txt = document.getElementById('et-box').value; const k = getDayKey(new Date(date.getFullYear(), date.getMonth(), eEvent.day)); saveToCloudAndLocal('event', `event_${k}`, { key: k, text: txt.trim(), base }); setEEvent(null); triggerToast(); }} className="w-full py-4 mt-4 bg-orange-600 text-white rounded-xl text-xl shadow-lg active:scale-95 transition-all">рҹ’ҫ е„ІеӯҳдәӢй …</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
