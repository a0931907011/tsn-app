<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>泰膳娘智慧排班系統 - 單機完美版</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    window.addEventListener('error', function(event) {
      console.error("系統錯誤:", event.error);
    });
  </script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"
      }
    }
  </script>

  <style>
    @media print {
      @page { size: A4 landscape; margin: 6mm; }
      body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; background: white !important; }
      ::-webkit-scrollbar { display: none !important; }
      .no-print { display: none !important; }
    }
    .gantt-table th, .gantt-table td { border: 1px solid #e5e7eb; }
    .bg-stripes { background-image: repeating-linear-gradient(45deg, #f8fafc 0, #f8fafc 10px, #f1f5f9 10px, #f1f5f9 20px); }
    .calendar-cell-scroll::-webkit-scrollbar { width: 4px; }
    .calendar-cell-scroll::-webkit-scrollbar-track { background: transparent; }
    .calendar-cell-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, addDoc } from 'firebase/firestore';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';
    import { 
      Calendar, Users, Clock, CheckCircle2, ChevronLeft, ChevronRight, 
      X, Edit3, UserCheck, Shield, Lock, Save, Tag, Search,
      Settings, Trash2, Download, Upload, Users2, ShieldCheck, LogOut, Printer, Zap, AlertCircle, Coffee,
      FileSpreadsheet
    } from 'lucide-react';

    // --- 🔐 1. Firebase 初始化 ---
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
      apiKey: "AIzaSyBY_L6oa0czZvDhvt55XSDGu9Ieu1OIhic",
      authDomain: "planning-with-ai-b050b.firebaseapp.com",
      projectId: "planning-with-ai-b050b",
      storageBucket: "planning-with-ai-b050b.firebasestorage.app",
      messagingSenderId: "45992279690",
      appId: "1:45992279690:web:5b2881d834bb1c2b52b773"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const appId = 'tsn-v150-local-master';
    
    const PWD_ADMIN = "tsn168";
    const PWD_STAFF = "40859555";

    const getDayKey = (d) => { const dateObj = (d instanceof Date) ? d : new Date(d); return `${dateObj.getFullYear()}_${dateObj.getMonth() + 1}_${dateObj.getDate()}`; };
    const timeToDecimal = (t) => { if (!t) return null; const [h, m] = t.split(':').map(Number); return h + (m === 30 ? 0.5 : 0); };
    const decimalToStr = (d) => { if (d === null) return ''; return String(d); };

    // --- 🚨 本地資料初始化腳本 ---
    const initializeLocalData = () => {
      const lsEmps = JSON.parse(localStorage.getItem('tsn_emp') || '[]');
      const lsShifts = JSON.parse(localStorage.getItem('tsn_shifts') || '[]');
      const lsEvents = JSON.parse(localStorage.getItem('tsn_events') || '[]');
      return { lsEmps, lsShifts, lsEvents };
    };

    // --- 🏠 2. 系統入口層 (登入畫面) ---
    export default function App() {
      const [user, setUser] = useState(null);
      const [role, setRole] = useState('none'); 
      const [isLoadingAuth, setIsLoadingAuth] = useState(false);

      useEffect(() => {
        const init = async () => {
          try { await signInAnonymously(auth); } 
          catch (err) { console.error("連線錯誤", err); }
        };
        init();
        const unsubscribe = onAuthStateChanged(auth, (u) => { setUser(u); });
        return () => unsubscribe();
      }, []);

      const handleLogin = async () => {
        setIsLoadingAuth(true);
        const pwd = document.getElementById('pwd-input').value;
        if (pwd === PWD_ADMIN) setRole('admin');
        else if (pwd === PWD_STAFF) setRole('partner');
        else alert("密碼錯誤！");
        setIsLoadingAuth(false);
      };

      if (role === 'none') return (
        <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6 font-sans">
          <div className="bg-white rounded-[3rem] p-12 w-full max-w-md text-center shadow-2xl animate-in zoom-in-95 border-4 border-white/10">
            <Lock className="mx-auto text-orange-600 mb-6" size={64} />
            <h1 className="text-3xl font-black mb-8 text-slate-800">泰膳娘系統入口</h1>
            <input 
              id="pwd-input" type="password" autoFocus placeholder="請輸入通行密碼"
              className="w-full border-4 border-slate-100 p-5 rounded-2xl text-center text-4xl mb-6 focus:border-orange-500 outline-none font-black shadow-inner bg-slate-50"
              onKeyDown={(e) => { if (e.key === 'Enter') handleLogin(); }}
            />
            <button 
              onClick={handleLogin}
              disabled={isLoadingAuth}
              className="w-full bg-orange-600 text-white py-6 rounded-2xl font-black text-2xl hover:bg-orange-700 transition-colors shadow-xl active:scale-95 disabled:opacity-50"
            >
              🚀 {isLoadingAuth ? '驗證中...' : '登入系統'}
            </button>
          </div>
        </div>
      );

      return <MainSystem user={user} isAdmin={role === 'admin'} onLogout={() => setRole('none')} />;
    }

    // --- 🚀 3. 核心主系統 ---
    function MainSystem({ user, isAdmin, onLogout }) {
      const [base, setBase] = useState(() => localStorage.getItem('tsn_base') || '0931907011');
      const { lsEmps, lsShifts, lsEvents } = useMemo(() => initializeLocalData(), []);
      
      const [employees, setEmployees] = useState(lsEmps);
      const [shifts, setShifts] = useState(lsShifts);
      const [events, setEvents] = useState(lsEvents); 
      
      const [view, setView] = useState('employee_matrix'); 
      const [toast, setToast] = useState(false);
      const [date, setDate] = useState(new Date(2026, 5, 16)); // 預設跳至6月份
      
      const dateInputRef = useRef(null);
      const fileInputRef = useRef(null);

      const [eShift, setEShift] = useState(null); 
      const [eEvent, setEEvent] = useState(null); 
      const [mHR, setMHR] = useState(false);
      const [hrForm, setHrForm] = useState({ id: null, name: '', type: '月薪', role: '主廚' }); 
      const [mBackup, setMBackup] = useState(false);
      const [showPrintModal, setShowPrintModal] = useState(false);

      const [locFilter, setLocFilter] = useState('全部');
      const [nameFilter, setNameFilter] = useState(''); 

      useEffect(() => { if (!isAdmin && locFilter === '全部') setLocFilter('麻豆'); }, [isAdmin, locFilter]);

      // --- 💾 雲端與本地端混和同步 ---
      useEffect(() => {
        if (!user) return;
        const p = (n) => collection(db, 'artifacts', appId, 'public', 'data', n);
        
        // 使用 try-catch 的概念在監聽器中，若被擋則使用本地資料
        const unsubEmp = onSnapshot(p('employees'), s => { 
          if(s.docs.length > 0) { const d = s.docs.map(x => ({id: x.id, ...x.data()})); setEmployees(d); localStorage.setItem('tsn_emp', JSON.stringify(d)); } 
        }, err => console.log('使用本地電腦儲存模式'));
        
        const unsubShifts = onSnapshot(p('shifts'), s => { 
          if(s.docs.length > 0) { const d = s.docs.map(x => ({id: x.id, ...x.data()})); setShifts(d); localStorage.setItem('tsn_shifts', JSON.stringify(d)); } 
        }, err => {});
        
        const unsubEvents = onSnapshot(p('events'), s => { 
          if(s.docs.length > 0) { const d = s.docs.map(x => ({id: x.id, ...x.data()})); setEvents(d); localStorage.setItem('tsn_events', JSON.stringify(d)); } 
        }, err => {});

        return () => { unsubEmp(); unsubShifts(); unsubEvents(); };
      }, [user]);

      const fEmployees = useMemo(() => employees.filter(e => e.base === base || !e.base), [employees, base]);
      const fShifts = useMemo(() => shifts.filter(s => s.base === base || !s.base), [shifts, base]);
      const fEvents = useMemo(() => events.filter(v => v.base === base || !v.base), [events, base]);

      const triggerToast = () => { setToast(true); setTimeout(() => setToast(false), 2000); };
      const handlePrint = () => { setShowPrintModal(true); };

      const handleExportExcel = () => {
        let csv = '\uFEFF日期,星期,姓名,崗位,出勤狀態,地點段一,時間段一,地點段二,時間段二,地點段三,時間段三\n';
        const y = date.getFullYear(); const m = date.getMonth();
        const days = new Date(y, m + 1, 0).getDate();
        const weekMap = ['日', '一', '二', '三', '四', '五', '六'];
        for (let d = 1; d <= days; d++) {
          const currentD = new Date(y, m, d); const key = getDayKey(currentD); const dow = weekMap[currentD.getDay()];
          fEmployees.forEach(emp => {
            const s = fShifts.find(sh => sh.empId === emp.id && sh.key === key);
            if (s) {
              let r = `${y}/${m + 1}/${d},${dow},${emp.name},${emp.role},`;
              if (s.leaveType === 'work') {
                // 匯出包含崗位與備註
                const s1 = `${s.shift1Loc||''}${s.shift1Station?`(${s.shift1Station})`:''}${s.shift1Note?`[${s.shift1Note}]`:''}`;
                const s2 = `${s.shift2Loc||''}${s.shift2Station?`(${s.shift2Station})`:''}${s.shift2Note?`[${s.shift2Note}]`:''}`;
                const s3 = `${s.shift3Loc||''}${s.shift3Station?`(${s.shift3Station})`:''}${s.shift3Note?`[${s.shift3Note}]`:''}`;
                r += `出勤,${s1},${s.shift1Start||''}-${s.shift1End||''},${s2},${s.shift2Start||''}-${s.shift2End||''},${s3},${s.shift3Start||''}-${s.shift3End||''}`;
              }
              else r += `${{'off':'休假','schedule_off':'排休','madou_off':'麻豆店休','liujia_off':'六甲店休','annual':'特休','sick':'病假','personal':'事假'}[s.leaveType] || s.leaveType},,,,,,`;
              csv += r + "\n";
            }
          });
        }
        const b = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); const url = URL.createObjectURL(b);
        const l = document.createElement("a"); l.href = url; l.download = `泰膳娘_${y}年${m+1}月_排班表.csv`;
        document.body.appendChild(l); l.click(); document.body.removeChild(l);
      };

      const weekDates = useMemo(() => { const d = date.getDay() === 0 ? 7 : date.getDay(); return Array.from({length: 7}, (_, i) => { const x = new Date(date); x.setDate(x.getDate() - d + i + 1); return x; }); }, [date]);
      const timeSlots = Array.from({ length: 30 }, (_, i) => { const val = 7 + (i * 0.5); return { val: val, label: val % 1 === 0 ? String(val) : String(val) }; });
      const getShiftObj = (empId, tDate) => fShifts.find(sh => sh.empId === empId && sh.key === getDayKey(tDate));
      const offEmployeesToday = useMemo(() => fEmployees.map(emp => { const s = getShiftObj(emp.id, date); return (s && s.leaveType && s.leaveType !== 'work') ? { name: emp.name, type: s.leaveType } : null; }).filter(Boolean), [fEmployees, fShifts, date]);
      const currentDailyEvent = fEvents.find(v => v.key === getDayKey(date));

      const renderEvents = (txt) => {
        if (!txt) return null;
        return String(txt).split(/[;；]/).map((str, idx) => {
          const t = str.trim(); if (!t) return null;
          if (t.includes("麻豆+六甲店休")) return <div key={idx} className="truncate print:whitespace-normal print:break-words text-[13px] md:text-[15px] print:text-[11px] text-red-600 font-black mb-1 md:mb-1.5 print:mb-0.5 tracking-wide bg-white/50 print:bg-transparent px-1 rounded">** {String(t)}</div>;
          if (t.includes("六甲店休")) return <div key={idx} className="truncate print:whitespace-normal print:break-words text-[13px] md:text-[15px] print:text-[11px] text-green-600 font-black mb-1 md:mb-1.5 print:mb-0.5 tracking-wide bg-white/50 print:bg-transparent px-1 rounded">** {String(t)}</div>;
          if (t.includes("麻豆店休")) return <div key={idx} className="truncate print:whitespace-normal print:break-words text-[13px] md:text-[15px] print:text-[11px] text-purple-600 font-black mb-1 md:mb-1.5 print:mb-0.5 tracking-wide bg-white/50 print:bg-transparent px-1 rounded">** {String(t)}</div>;
          if (t.includes("新光空班")) return <div key={idx} className="truncate print:whitespace-normal print:break-words text-[13px] md:text-[15px] print:text-[11px] text-orange-500 font-black mb-1 md:mb-1.5 print:mb-0.5 tracking-wide bg-white/50 print:bg-transparent px-1 rounded">** {String(t)}</div>;
          return <div key={idx} className="truncate print:whitespace-normal print:break-words text-[12px] md:text-[14px] print:text-[10px] bg-yellow-100 text-slate-800 print:bg-transparent border border-yellow-200 px-1.5 md:px-2 print:px-0 py-0.5 md:py-1 print:py-0 rounded-md mb-1 md:mb-1.5 print:mb-0.5 font-bold print:leading-tight">• {String(t)}</div>;
        });
      };

      const applyShiftTemplate = (type) => {
        const d1 = eShift.shift1Loc || '麻豆'; const d2 = eShift.shift2Loc || '麻豆';
        let u = {};
        if (type === 'full') u = { shift1Start: '09:30', shift1End: '13:30', shift1Loc: d1, shift2Start: '16:30', shift2End: '20:30', shift2Loc: d2, shift3Start: '', shift3End: '' };
        else if (type === 'morning') u = { shift1Start: '09:30', shift1End: '13:30', shift1Loc: d1, shift2Start: '', shift2End: '', shift3Start: '', shift3End: '' };
        else if (type === 'evening') u = { shift1Start: '16:30', shift1End: '20:30', shift1Loc: d1, shift2Start: '', shift2End: '', shift3Start: '', shift3End: '' };
        else if (type === 'pt_a') u = { shift1Start: '11:00', shift1End: '14:00', shift1Loc: d1, shift2Start: '', shift2End: '', shift3Start: '', shift3End: '' };
        else if (type === 'pt_b') u = { shift1Start: '17:00', shift1End: '21:00', shift1Loc: d1, shift2Start: '', shift2End: '', shift3Start: '', shift3End: '' };
        else if (type === 'clear') {
          u = { 
            shift1Start: '', shift1End: '', shift2Start: '', shift2End: '', shift3Start: '', shift3End: '', 
            shift1SubId: '', shift2SubId: '', shift3SubId: '',
            shift1Station: '', shift2Station: '', shift3Station: '',
            shift1Note: '', shift2Note: '', shift3Note: ''
          };
        }
        setEShift(p => ({ ...p, ...u }));
      };

      // 💾 強健的寫入機制：一定會先存本地，就算雲端斷線也沒關係
      const saveToCloudAndLocal = async (type, id, data) => {
        try {
          if (type === 'employee') { const n = data ? [...employees.filter(e => e.id !== id), {id, ...data}] : employees.filter(e => e.id !== id); setEmployees(n); localStorage.setItem('tsn_emp', JSON.stringify(n)); }
          else if (type === 'shift') { const n = data ? [...shifts.filter(s => s.id !== id), {id, ...data}] : shifts.filter(s => s.id !== id); setShifts(n); localStorage.setItem('tsn_shifts', JSON.stringify(n)); }
          else if (type === 'event') { const n = data ? [...events.filter(v => v.id !== id), {id, ...data}] : events.filter(v => v.id !== id); setEvents(n); localStorage.setItem('tsn_events', JSON.stringify(n)); }
          
          if (data) {
             await setDoc(doc(db, 'artifacts', appId, 'public', 'data', type + 's', id), data);
          } else {
             await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', type + 's', id));
          }
        } catch (err) { console.warn("雲端操作失敗，已在本地端完成。"); }
      };

      const handleDownloadBackup = () => {
        const data = { employees, shifts, events, baseCode: base, backupDate: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `泰膳娘排班備份_${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
      };

      // 📥 本地與雲端雙重備份還原
      const handleUploadRestore = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            let content = e.target.result;
            if (content.charCodeAt(0) === 0xFEFF) content = content.slice(1);
            const res = JSON.parse(content);
            if (!res || (!res.employees && !res.shifts)) throw new Error("無效檔案");
            
            // 強制寫入本地記憶體
            if (res.employees) {
              const emps = res.employees.map(x => ({...x, base}));
              setEmployees(emps); localStorage.setItem('tsn_emp', JSON.stringify(emps));
              emps.forEach(emp => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employees', emp.id), emp).catch(e=>{}));
            }
            if (res.shifts) {
              const shs = res.shifts.map(x => ({...x, base}));
              setShifts(shs); localStorage.setItem('tsn_shifts', JSON.stringify(shs));
              shs.forEach(s => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shifts', s.id || `${s.empId}_${s.key}`), s).catch(e=>{}));
            }
            if (res.events) {
              const evs = res.events.map(x => ({...x, base}));
              setEvents(evs); localStorage.setItem('tsn_events', JSON.stringify(evs));
              evs.forEach(v => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', v.id || `event_${v.key}`), v).catch(e=>{}));
            }
            
            triggerToast(); setMBackup(false); 
            if (res.shifts && res.shifts.length > 0) {
              const parts = res.shifts[0].key.split('_');
              if (parts.length === 3) setDate(new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2])));
            }
            alert("✅ 備份檔已成功匯入！您的資料已妥善保存在電腦中。");
          } catch (err) { alert("❌ 檔案讀取失敗，請確認檔案格式"); }
          event.target.value = null;
        };
        reader.readAsText(file);
      };

      return (
        <div className="min-h-screen bg-slate-100 print:bg-white flex flex-col font-sans font-bold text-slate-800 select-none">
          
          {/* 💡 加入動態崗位選單 */}
          <datalist id="station-options">
            <option value="內場" />
            <option value="外場" />
            <option value="櫃台" />
            <option value="外送" />
            <option value="機動" />
            <option value="砧板" />
            <option value="炸台" />
            <option value="湯台" />
            <option value="內為主外輔（主廚調配）" />
            <option value="外為主內輔（主廚協調）" />
            <option value="炸+砧（主廚調配）" />
            <option value="湯+砧（主廚調配）" />
          </datalist>

          <style>{`@media print { @page { size: A4 landscape; margin: 8mm; } body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; background: white !important; } ::-webkit-scrollbar { display: none !important; } }`}</style>
          {toast && <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[9999] bg-slate-800 text-white px-8 py-4 rounded-full flex items-center gap-3 shadow-2xl animate-in slide-in-from-top-4 print:hidden"><CheckCircle2 className="text-green-400" size={24} /> <span className="font-black tracking-widest text-lg">資料儲存成功</span></div>}

          <nav className="max-w-[2400px] w-full mx-auto bg-white p-4 shadow-xl flex flex-col lg:flex-row justify-between items-center sticky top-0 z-40 border-b-2 print:hidden">
            <div className="flex items-center gap-4">
              <div className={`p-3 rounded-2xl text-white shadow-lg ${isAdmin ? 'bg-orange-600 shadow-orange-200' : 'bg-slate-800'}`}>{isAdmin ? <ShieldCheck size={32}/> : <UserCheck size={32}/>}</div>
              <div><h1 className="text-2xl font-black tracking-tighter">泰膳娘系統 <span className="bg-red-100 text-red-600 text-[10px] px-2 py-0.5 rounded align-middle">單機/雲端雙用版</span></h1></div>
            </div>
            <div className="flex items-center gap-3 flex-wrap mt-4 lg:mt-0">
              <div className="flex bg-slate-100 p-1.5 rounded-xl items-center shadow-inner">
                <button onClick={() => setDate(new Date(date.getFullYear(), date.getMonth(), date.getDate() - (view==='employee_matrix'?7:view==='daily'?1:30)))} className="p-2 hover:bg-white rounded-lg transition-colors"><ChevronLeft size={20}/></button>
                <span className="px-4 text-xl font-black text-orange-600">{view === 'employee_matrix' ? `${date.getFullYear()}年 ${date.getMonth()+1}月 第 ${Math.ceil(date.getDate()/7)} 週` : view === 'daily' ? `${date.getFullYear()}年 ${date.getMonth()+1}月${date.getDate()}日` : `${date.getFullYear()}年 ${date.getMonth() + 1}月`}</span>
                <button onClick={() => setDate(new Date(date.getFullYear(), date.getMonth(), date.getDate() + (view==='employee_matrix'?7:view==='daily'?1:30)))} className="p-2 hover:bg-white rounded-lg transition-colors"><ChevronRight size={20}/></button>
              </div>
              <div className="flex bg-slate-100 p-1.5 rounded-xl shadow-inner font-black text-sm">
                <button onClick={() => setView('employee_matrix')} className={`px-4 py-2 rounded-lg transition-all ${view==='employee_matrix'?'bg-white text-orange-600 shadow-md':'text-slate-500'}`}>📝 員工週總表</button>
                <button onClick={() => setView('daily')} className={`px-4 py-2 rounded-lg transition-all ${view==='daily'?'bg-white text-orange-600 shadow-md':'text-slate-500'}`}>🕒 時間甘特圖</button>
                <button onClick={() => setView('monthly')} className={`px-4 py-2 rounded-lg transition-all ${view==='monthly'?'bg-white text-orange-600 shadow-md':'text-slate-500'}`}>🗓️ 營運月曆</button>
              </div>
              <div className="flex gap-2 ml-2">
                <button onClick={handlePrint} className="px-4 py-2 bg-orange-100 text-orange-700 rounded-xl shadow-sm transition-all flex items-center gap-2 text-sm"><Printer size={20}/> 列印</button>
                <button onClick={handleExportExcel} className="px-4 py-2 bg-green-100 text-green-700 rounded-xl shadow-sm transition-all flex items-center gap-2 text-sm"><FileSpreadsheet size={20}/> 匯出</button>
                {isAdmin && (
                  <>
                    <button onClick={() => { setMHR(true); setHrForm({ id: null, name: '', type: '月薪', role: '主廚' }); }} className="p-2 bg-white border border-slate-200 text-orange-600 rounded-xl shadow-sm" title="人資庫"><Users2 size={22}/></button>
                    <button onClick={() => setMBackup(true)} className="px-4 py-2 bg-white border border-slate-200 text-orange-600 rounded-xl shadow-sm transition-all flex items-center gap-2"><Shield size={20}/>上傳備份</button>
                  </>
                )}
                <button onClick={onLogout} className="p-2 bg-red-50 text-red-600 rounded-xl shadow-sm ml-1"><LogOut size={22}/></button>
              </div>
            </div>
          </nav>

          <main className="flex-1 w-full max-w-[2400px] mx-auto p-4 md:p-6 print:p-0 print:m-0 font-black">
            {/* 視圖 1: 員工週總表 */}
            {view === 'employee_matrix' && (
              <div className="bg-white rounded-3xl print:rounded-none shadow-xl print:shadow-none border print:border-none border-slate-200 overflow-hidden print:overflow-visible flex flex-col max-h-[75vh] md:max-h-[80vh] print:max-h-none">
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center p-6 border-b bg-slate-50 print:hidden shrink-0 gap-4">
                  <div className="text-xl font-black text-slate-700 flex items-center gap-2"><Calendar size={28} className="text-orange-600"/> 當週排班篩選</div>
                  <div className="flex items-center gap-3 flex-wrap">
                    <div className="relative">
                      <input type="text" placeholder="輸入姓名..." value={nameFilter} onChange={e => setNameFilter(e.target.value)} className="bg-white border-2 border-slate-200 text-slate-700 px-4 py-3 rounded-xl font-bold shadow-sm outline-none focus:border-orange-500 transition-colors w-40 md:w-48 pl-10" />
                      <Search className="absolute left-3 top-3.5 text-slate-400" size={18}/>
                    </div>
                    <select value={locFilter} onChange={(e) => setLocFilter(e.target.value)} className="bg-white border-2 border-slate-200 text-slate-700 px-4 py-3 rounded-xl font-bold shadow-sm outline-none focus:border-orange-500 transition-colors cursor-pointer">
                      {isAdmin && <option value="全部">全據點</option>}
                      <option value="麻豆">📍 麻豆</option><option value="六甲">📍 六甲</option><option value="茂迪">📍 茂迪</option><option value="餐車">🚚 餐車</option>
                    </select>
                  </div>
                </div>
                <div className="hidden print:block text-center py-2 bg-white mb-2 shrink-0">
                   <h2 className="text-xl font-black">泰膳娘 員工排班週總表 ({weekDates[0].getMonth()+1}/{weekDates[0].getDate()} ~ {weekDates[6].getMonth()+1}/{weekDates[6].getDate()})</h2>
                </div>
                <div className="overflow-auto flex-1 print:overflow-visible">
                  <table className="w-full text-center border-collapse text-[14px] print:text-[11px] gantt-table relative min-w-[800px]">
                    <thead className="sticky top-0 z-20 shadow-sm">
                      <tr className="bg-slate-100 print:bg-gray-100">
                        <th className="py-4 px-2 w-24 bg-slate-100 print:bg-gray-100">姓名</th>
                        <th className="py-4 px-2 w-24 bg-slate-100 print:bg-gray-100">崗位</th>
                        {weekDates.map((d, i) => (
                          <th key={i} className="py-4 px-2 min-w-[120px] bg-slate-100 print:bg-gray-100 border-l border-white print:border-gray-300">
                            <div className="text-slate-500 print:text-black font-black text-lg">{d.getDate()}</div>
                            <div className="text-xs text-slate-400">星期{['日','一','二','三','四','五','六'][d.getDay()]}</div>
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {fEmployees.filter(emp => {
                        if (nameFilter && !emp.name.includes(nameFilter)) return false;
                        if (locFilter === '全部') return true;
                        return weekDates.some(d => {
                          const s = getShiftObj(emp.id, d);
                          return s && s.leaveType === 'work' && [s.shift1Loc, s.shift2Loc, s.shift3Loc].includes(locFilter);
                        });
                      }).map(emp => (
                        <tr key={emp.id} className="hover:bg-slate-50 transition-colors group">
                          <td className="py-5 px-2 font-black bg-slate-50 print:bg-transparent text-lg">{emp.name}</td>
                          <td className="py-5 px-2 text-slate-500 font-bold bg-slate-50 print:bg-transparent">{emp.role}</td>
                          {weekDates.map((d, i) => {
                            const s = getShiftObj(emp.id, d);
                            let bgColor = "bg-white", textColor = "text-slate-800", content = "", segments = [];
                            if (!s) bgColor = "bg-transparent hover:bg-slate-100";
                            else if (s.leaveType === 'work') {
                              [1, 2, 3].forEach(n => {
                                const loc = String(s[`shift${n}Loc`] || ''); 
                                const start = decimalToStr(timeToDecimal(s[`shift${n}Start`])); 
                                const end = decimalToStr(timeToDecimal(s[`shift${n}End`])); 
                                const subId = s[`shift${n}SubId`] || s.subId; 
                                const station = s[`shift${n}Station`] || '';
                                const note = s[`shift${n}Note`] || '';
                                if (loc && start && end && (locFilter === '全部' || loc === locFilter)) {
                                   let subName = ''; if (subId) { const subEmp = fEmployees.find(e => e.id === subId); if (subEmp) subName = subEmp.name; }
                                   segments.push({ loc, start, end, subName, station, note });
                                }
                              });
                              if (segments.length > 0) {
                                const firstLoc = segments[0].loc;
                                if (firstLoc.includes('麻豆')) { bgColor = "bg-[#d946ef]"; textColor = "text-white"; }
                                else if (firstLoc.includes('六甲')) { bgColor = "bg-[#86efac]"; textColor = "text-slate-900"; }
                                else { bgColor = "bg-blue-400"; textColor = "text-white"; }
                              } else bgColor = "bg-transparent hover:bg-slate-100"; 
                            } else {
                              if (s.leaveType === 'off') { bgColor = "bg-yellow-100"; textColor = "text-yellow-700"; content = "休假"; }
                              else if (s.leaveType === 'schedule_off') { bgColor = "bg-yellow-300"; textColor = "text-slate-800"; content = "排休"; }
                              else if (s.leaveType === 'madou_off') { bgColor = "bg-purple-100"; textColor = "text-purple-800"; content = "麻豆店休"; }
                              else if (s.leaveType === 'liujia_off') { bgColor = "bg-green-100"; textColor = "text-green-800"; content = "六甲店休"; }
                              else if (s.leaveType === 'annual') { bgColor = "bg-green-200"; textColor = "text-green-800"; content = "特休"; }
                              else if (s.leaveType === 'sick') { bgColor = "bg-red-200"; textColor = "text-red-800"; content = "病假"; }
                              else if (s.leaveType === 'personal') { bgColor = "bg-orange-200"; textColor = "text-orange-800"; content = "事假"; }
                              if ((s.leaveType === 'madou_off' && locFilter === '六甲') || (s.leaveType === 'liujia_off' && locFilter === '麻豆')) { bgColor = "bg-transparent hover:bg-slate-100"; content = ""; }
                            }
                            return (
                              <td key={i} onClick={() => isAdmin && setEShift({ empId: emp.id, key: getDayKey(d), leaveType: s?.leaveType || 'work', shift1Loc: '麻豆', shift2Loc: '麻豆', shift3Loc: '麻豆', ...s })} className={`${bgColor} ${textColor} p-2 border font-bold cursor-pointer print:border-black whitespace-pre-line leading-snug relative`}>
                                {s && s.leaveType === 'work' ? segments.map((seg, idx) => (
                                  <div key={idx} className="leading-tight mb-2 last:mb-0">
                                    <span className={seg.subName ? "line-through opacity-60" : ""}>{seg.loc} {seg.start}-{seg.end}</span>
                                    {/* 💡 高辨識度的非紅色深藍字體，完美融入且清晰可讀 */}
                                    {seg.station && <div className="text-blue-800 font-black mt-0.5 text-[12px]">{seg.station}</div>}
                                    {seg.note && <div className="text-slate-700 font-black mt-0.5 text-[11px]">({seg.note})</div>}
                                    {seg.subName && <div className="text-[10px] mt-0.5 text-red-600 bg-white/90 px-1 rounded inline-block shadow-sm font-black">({seg.subName}代)</div>}
                                  </div>
                                )) : content}
                              </td>
                            );
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* 視圖 2: 經典甘特圖 */}
            {view === 'daily' && (
              <div className="bg-white rounded-3xl print:rounded-none shadow-xl print:shadow-none border print:border-none border-slate-200 overflow-hidden print:overflow-visible flex flex-col max-h-[75vh] md:max-h-[80vh] print:max-h-none">
                
                <div className="flex justify-between items-center p-6 border-b bg-slate-50 print:bg-white print:p-2 shrink-0">
                  <h2 className="text-2xl font-black flex flex-wrap items-center gap-3">
                    {date.getFullYear()}年{date.getMonth()+1}月{date.getDate()}日 (星期{['日','一','二','三','四','五','六'][date.getDay()]}) 排班時間表
                  </h2>
                  <div className="flex items-center gap-2 no-print">
                    
                    <div className="relative mr-2">
                      <input type="text" placeholder="輸入姓名..." value={nameFilter} onChange={e => setNameFilter(e.target.value)} className="bg-white border-2 border-slate-200 text-slate-700 px-3 py-2 rounded-xl font-bold shadow-sm outline-none focus:border-orange-500 transition-colors w-40 pl-10" />
                      <Search className="absolute left-3 top-3.5 text-slate-400" size={18} />
                    </div>

                    <select value={locFilter} onChange={(e) => setLocFilter(e.target.value)} className="bg-white border-2 border-slate-200 text-slate-700 px-3 py-2 rounded-xl font-bold shadow-sm outline-none focus:border-orange-500 transition-colors mr-2 cursor-pointer">
                      {isAdmin && <option value="全部">全據點</option>}
                      <option value="麻豆">📍 麻豆</option><option value="六甲">📍 六甲</option><option value="茂迪">📍 茂迪</option><option value="餐車">🚚 餐車</option>
                    </select>

                    <button onClick={() => setDate(new Date(date.getFullYear(), date.getMonth(), date.getDate() - 1))} className="p-2 bg-slate-200 hover:bg-slate-300 text-slate-600 rounded-xl transition-colors"><ChevronLeft size={20}/></button>
                    <div className="flex items-center gap-2 bg-orange-100 hover:bg-orange-200 text-orange-700 px-4 py-2.5 rounded-xl shadow-inner transition-colors relative cursor-pointer">
                      <Calendar size={20} className="pointer-events-none z-10" />
                      <input type="date" ref={dateInputRef} className="bg-transparent outline-none cursor-pointer font-black text-orange-700 absolute inset-0 opacity-0 z-20 scale-150" value={`${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`} onChange={(e) => { if(e.target.value) { const [y, m, d] = e.target.value.split('-'); setDate(new Date(y, m - 1, d)); } }} />
                      <span className="pointer-events-none z-10 font-black">選擇日期</span>
                    </div>
                    <button onClick={() => setDate(new Date(date.getFullYear(), date.getMonth(), date.getDate() + 1))} className="p-2 bg-slate-200 hover:bg-slate-300 text-slate-600 rounded-xl transition-colors"><ChevronRight size={20}/></button>
                  </div>
                </div>

                {offEmployeesToday.length > 0 && (
                  <div className="bg-slate-100 border-b-4 border-slate-300 p-4 flex flex-col sm:flex-row items-start sm:items-center gap-4 shrink-0 rounded-3xl print:hidden m-4">
                    <div className="flex items-center gap-2 text-slate-600 font-black text-lg whitespace-nowrap bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-200">
                      <Coffee size={24} className="text-amber-700" /> 🌴 休假/請假名單
                    </div>
                    <div className="flex flex-wrap gap-2">
                      {offEmployeesToday.map((e, i) => (
                        <div key={i} className="bg-white border-2 border-slate-200 px-4 py-2 rounded-xl shadow-sm flex items-center gap-2 hover:border-orange-300 transition-colors">
                          <span className="font-black text-slate-800 text-md">{e.name}</span>
                          <span className="text-xs bg-slate-200 text-slate-600 px-2 py-1 rounded-lg font-bold">
                            {{'off':'休假','schedule_off':'排休','madou_off':'麻豆店休','liujia_off':'六甲店休','annual':'特休','sick':'病假','personal':'事假'}[e.type] || '休假'}
                          </span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                
                <div className="overflow-auto flex-1 print:overflow-visible p-4 print:p-0">
                  <table className="w-full text-center border-collapse text-[12px] print:text-[10px] gantt-table table-fixed min-w-[1200px] print:min-w-full relative shadow-sm">
                    <thead className="sticky top-0 z-20 shadow-md">
                      <tr className="bg-slate-800 text-white print:bg-gray-200 print:text-black">
                        <th className="w-16 py-1.5 bg-slate-800 print:bg-gray-200 text-sm">姓名</th>
                        <th className="w-20 py-1.5 bg-slate-800 print:bg-gray-200 text-sm">崗位/地點</th>
                        <th className="w-32 text-[10px] leading-tight border-r-4 border-slate-400 p-1.5 bg-slate-800 print:bg-gray-200 align-middle">
                          <div className="text-slate-200 print:text-slate-800 mb-1">
                            {date.getMonth()+1}/{date.getDate()}({['日','一','二','三','四','五','六'][date.getDay()]}) <span className="text-[8px] block opacity-80">(紅字為代班)</span>
                          </div>
                          {currentDailyEvent && currentDailyEvent.text && (
                            <div className="text-[10px] text-red-700 bg-red-100 rounded border border-red-300 px-1 py-0.5 mx-1 shadow-sm leading-tight text-center font-bold truncate" title={currentDailyEvent.text}>
                              📌 {currentDailyEvent.text.replace(/[;；]/g, ' ')}
                            </div>
                          )}
                        </th>
                        {timeSlots.map((slot, i) => (
                          <th key={i} className={`w-8 py-1.5 font-mono bg-slate-800 print:bg-gray-200 ${slot.val % 1 === 0 ? 'border-l border-white/30 print:border-black' : ''}`}>
                            {slot.label}
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {fEmployees.filter(emp => {
                        if (nameFilter && !emp.name.includes(nameFilter)) return false;
                        if (locFilter === '全部') return true;
                        const s = getShiftObj(emp.id, date);
                        if (!s || s.leaveType !== 'work') return false;
                        const activeLocs = [];
                        if (s.shift1Start && s.shift1End) activeLocs.push(s.shift1Loc);
                        if (s.shift2Start && s.shift2End) activeLocs.push(s.shift2Loc);
                        if (s.shift3Start && s.shift3End) activeLocs.push(s.shift3Loc);
                        return activeLocs.includes(locFilter);
                      }).map(emp => {
                        const s = getShiftObj(emp.id, date);
                        const isWork = s?.leaveType === 'work';
                        const isOff = s && s.leaveType !== 'work';
                        
                        let infoStr = ''; let segments = [];
                        
                        if (!s) infoStr = ''; 
                        else if (s.leaveType === 'off') infoStr = '休假';
                        else if (s.leaveType === 'schedule_off') infoStr = '排休';
                        else if (s.leaveType === 'madou_off') infoStr = '麻豆店休';
                        else if (s.leaveType === 'liujia_off') infoStr = '六甲店休';
                        else if (s.leaveType === 'annual') infoStr = '特休';
                        else if (s.leaveType === 'sick') infoStr = '病假';
                        else if (s.leaveType === 'personal') infoStr = '事假';
                        
                        const slotLocations = new Map();
                        const slotSubs = new Map();

                        if (isWork) {
                          [1, 2, 3].forEach(n => {
                            const loc = String(s[`shift${n}Loc`] || '');
                            const stRaw = s[`shift${n}Start`];
                            const edRaw = s[`shift${n}End`];
                            const st = timeToDecimal(stRaw);
                            const ed = timeToDecimal(edRaw);
                            const subId = s[`shift${n}SubId`] || s.subId;
                            const station = s[`shift${n}Station`] || '';
                            const note = s[`shift${n}Note`] || '';
                            if (locFilter !== '全部' && loc !== locFilter) return; 
                            if (st !== null && ed !== null) {
                              let subName = '';
                              if (subId) { const subEmp = fEmployees.find(e => e.id === subId); if (subEmp) subName = subEmp.name; }
                              segments.push({ loc, start: decimalToStr(st), end: decimalToStr(ed), subName, station, note });
                              timeSlots.forEach(slot => { 
                                if (slot.val >= st && slot.val < ed) { 
                                  slotLocations.set(slot.val, { loc, station, note, isStart: slot.val === st }); 
                                  if (subName) slotSubs.set(slot.val, subName); 
                                }
                              });
                            }
                          });
                        }

                        if (isOff) {
                          return (
                            <tr key={emp.id} className="cursor-pointer border-b bg-stripes opacity-90 hover:opacity-100 h-10" onClick={() => isAdmin && setEShift({ empId: emp.id, key: getDayKey(date), leaveType: 'work', shift1Loc: '麻豆', shift2Loc: '麻豆', shift3Loc: '麻豆', ...s })}>
                              <td className="py-2 font-black text-slate-400 bg-white text-sm">{emp.name}</td>
                              <td className="text-slate-400 font-bold bg-white text-sm">{emp.role}</td>
                              <td className="border-r-4 border-slate-300 font-mono font-black text-slate-400 bg-white">{infoStr}</td>
                              <td colSpan={timeSlots.length} className="text-center">
                                <div className="flex items-center justify-center gap-3 w-full h-full py-1">
                                  <Coffee size={20} className="text-slate-400" />
                                  <span className="text-lg font-black text-slate-500 tracking-[0.5rem] bg-white/80 px-4 py-1 rounded-xl shadow-sm border border-slate-200">
                                    {{'off':'休假','schedule_off':'排休','madou_off':'麻豆店休','liujia_off':'六甲店休','annual':'特休','sick':'病假','personal':'事假'}[s.leaveType] || '休假'}
                                  </span>
                                </div>
                              </td>
                            </tr>
                          );
                        }

                        return (
                          <tr key={emp.id} className="hover:bg-slate-50 cursor-pointer border-b h-10" onClick={() => isAdmin && setEShift({ empId: emp.id, key: getDayKey(date), leaveType: s?.leaveType || 'work', shift1Loc: '麻豆', shift2Loc: '麻豆', shift3Loc: '麻豆', ...s })}>
                            <td className="py-2 font-black text-sm">{emp.name}</td>
                            <td className="text-slate-500 font-bold text-sm">{emp.role} {isWork && segments.length > 0 ? `(${segments[0].loc})` : ''}</td>
                            <td className="border-r-4 border-slate-300 print:border-black font-mono">
                              {segments.length > 0 ? segments.map((seg, idx) => (
                                <div key={idx} className="mb-1 last:mb-0 leading-tight">
                                  <span className={seg.subName ? "text-red-600 line-through" : ""}>{seg.loc} {seg.start}-{seg.end}</span>
                                  {/* 💡 同步優化文字清單中的顏色為深藍字體 */}
                                  {seg.station && <div className="text-blue-800 font-black text-[11px] mt-0.5">{seg.station}</div>}
                                  {seg.note && <div className="text-slate-700 font-black text-[10px] mt-0.5">({seg.note})</div>}
                                  {seg.subName && <div className="text-red-600 text-[10px] font-black mt-0.5">由 {seg.subName} 代</div>}
                                </div>
                              )) : <span className="text-slate-400">{infoStr}</span>}
                            </td>
                            {timeSlots.map((slot, i) => {
                              const cellData = slotLocations.get(slot.val);
                              const subName = slotSubs.get(slot.val);
                              let bgColor = '';
                              
                              if (cellData && cellData.loc) {
                                if (cellData.loc.includes('六甲')) bgColor = 'bg-green-500 print:bg-black';
                                else if (cellData.loc.includes('麻豆')) bgColor = 'bg-purple-500 print:bg-black';
                                else bgColor = 'bg-blue-500 print:bg-black';
                              }

                              return (
                                <td key={i} className={`${bgColor} relative ${slot.val % 1 === 0 ? 'border-l-2 border-slate-200 print:border-black' : 'border-l border-slate-100 print:border-gray-400'}`}>
                                   {subName && slot.val % 1 === 0 && <span className="absolute left-0 top-0 text-[8px] text-white opacity-70 scale-75 origin-top-left ml-0.5 mt-0.5 font-black">代</span>}
                                   
                                   {/* 💡 甘特圖內的深藍浮動標籤 (非紅色) */}
                                   {cellData && cellData.isStart && (cellData.station || cellData.note) && (
                                      <div className="absolute left-1 top-1 z-30 flex flex-col gap-0.5 pointer-events-none w-max">
                                          {cellData.station && <span className="bg-blue-700 text-white text-[10px] px-1.5 py-0.5 rounded shadow-sm whitespace-nowrap font-black border border-white/50">{cellData.station}</span>}
                                          {cellData.note && <span className="bg-slate-700 text-white text-[9px] px-1.5 py-0.5 rounded shadow-sm whitespace-nowrap font-bold border border-white/50">({cellData.note})</span>}
                                      </div>
                                   )}
                                </td>
                              );
                            })}
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* 視圖 3: 營運月曆 */}
            {view === 'monthly' && (
              <div className="bg-white rounded-3xl print:rounded-none shadow-xl print:shadow-none border print:border-none border-slate-200 overflow-hidden flex flex-col max-h-[75vh] md:max-h-[80vh] print:max-h-none">
                <div className="grid grid-cols-7 bg-slate-800 print:bg-slate-200 text-white print:text-black text-xs tracking-widest text-center py-4 uppercase shrink-0 sticky top-0 z-20 shadow-md">
                  {['MON','TUE','WED','THU','FRI','SAT','SUN'].map(d => <div key={d}>{d}</div>)}
                </div>
                <div className="grid grid-cols-7 overflow-y-auto flex-1 print:overflow-visible calendar-cell-scroll">
                  {Array.from({ length: (new Date(date.getFullYear(), date.getMonth(), 1).getDay() + 6) % 7 }).map((_, i) => <div key={i} className="h-[120px] md:h-[150px] lg:h-[160px] bg-slate-50/50 border-r border-b" />)}
                  {Array.from({ length: new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate() }).map((_, i) => {
                    const day = i + 1; const k = getDayKey(new Date(date.getFullYear(), date.getMonth(), day));
                    const ev = fEvents.find(v => v.key === k);
                    return (
                      <div key={day} onClick={() => { setDate(new Date(date.getFullYear(), date.getMonth(), day)); setView('daily'); }} className="h-[120px] md:h-[150px] lg:h-[160px] p-2 md:p-3 border-r border-b hover:bg-orange-50/40 cursor-pointer relative group flex flex-col">
                        <div className="flex justify-between items-start mb-1 shrink-0">
                          <span className="text-lg md:text-xl font-sans font-black">{day}</span>
                          {isAdmin && <button onClick={(e) => { e.stopPropagation(); setEEvent({ day, text: ev?.text || "" }); }} className="p-1 text-slate-200 group-hover:text-orange-500 no-print"><Tag size={16}/></button>}
                        </div>
                        <div className="flex-1 overflow-y-auto calendar-cell-scroll pr-1">{renderEvents(ev?.text)}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </main>

          {/* 彈窗模組 */}
          <div className="print:hidden">
            {/* 上傳還原模組 */}
            {mBackup && (
              <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-xl flex items-center justify-center z-[6000] p-6 font-black font-sans">
                <div className="bg-white rounded-[3rem] w-full max-w-2xl p-10 shadow-2xl animate-in zoom-in-95">
                  <div className="flex justify-between items-center mb-8"><h3 className="text-3xl"><Shield className="inline mr-2 text-blue-600"/>備份與還原</h3><button onClick={() => setMBackup(false)} className="p-3 bg-slate-100 rounded-full"><X/></button></div>
                  
                  <div className="bg-orange-50 p-8 rounded-2xl relative border-4 border-orange-100 mb-6">
                    <h4 className="text-2xl text-orange-800 mb-4">📥 第一步：讀取您的備份檔</h4>
                    <input type="file" accept=".json" ref={fileInputRef} onChange={handleUploadRestore} className="hidden" />
                    <button onClick={() => fileInputRef.current.click()} className="w-full py-6 bg-orange-600 text-white rounded-xl text-2xl shadow-lg"><Upload className="inline mr-2"/>上傳備份檔案並還原</button>
                    <p className="text-center text-sm text-orange-800 mt-4">👉 點擊上方按鈕，選取您電腦裡的 .json 備份檔即可！</p>
                  </div>
                  
                  <div className="bg-slate-100 p-6 rounded-2xl">
                    <button onClick={handleDownloadBackup} className="w-full py-4 bg-slate-800 text-white rounded-xl text-xl shadow-lg"><Download className="inline mr-2"/>下載備份 (.json)</button>
                  </div>
                </div>
              </div>
            )}

            {/* 夥伴管理 */}
            {mHR && (
              <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center z-[5000] p-4 font-black font-sans">
                <div className="bg-white rounded-3xl w-full max-w-7xl h-[85vh] flex flex-col shadow-2xl">
                  <div className="bg-slate-900 p-6 text-white flex justify-between items-center"><h3 className="text-2xl"><Users2 className="inline mr-2"/>夥伴資料庫</h3><button onClick={() => setMHR(false)}><X/></button></div>
                  <div className="flex-1 grid grid-cols-12 overflow-hidden">
                    <div className="col-span-4 p-8 bg-slate-50 border-r-4">
                      <input className="w-full border-2 p-3 mb-4 rounded-xl" placeholder="姓名" value={hrForm.name} onChange={e => setHrForm({...hrForm, name: e.target.value})} />
                      <select className="w-full border-2 p-3 mb-4 rounded-xl" value={hrForm.type} onChange={e => setHrForm({...hrForm, type: e.target.value})}><option>月薪</option><option>PT</option></select>
                      <select className="w-full border-2 p-3 mb-4 rounded-xl" value={hrForm.role} onChange={e => setHrForm({...hrForm, role: e.target.value})}><option>主廚</option><option>機動人員</option><option>櫃台</option><option>炸台</option><option>湯台</option></select>
                      <button onClick={async () => { if(!hrForm.name) return; saveToCloudAndLocal('employee', hrForm.id || `emp_${Date.now()}`, { name: hrForm.name, type: hrForm.type, role: hrForm.role, base }); setHrForm({id:null, name:'', type:'月薪', role:'主廚'}); triggerToast(); }} className="w-full py-4 bg-orange-600 text-white rounded-xl text-xl">💾 儲存</button>
                    </div>
                    <div className="col-span-8 p-8 overflow-y-auto grid grid-cols-2 gap-4 content-start">
                      {fEmployees.map(e => (
                        <div key={e.id} className="p-5 border-2 rounded-2xl flex justify-between items-center shadow-sm">
                          <div><div className="text-xl font-black">{e.name} <span className="text-xs bg-blue-500 text-white px-2 py-1 rounded">{e.type}</span></div></div>
                          <div className="flex gap-2"><button onClick={() => setHrForm({ id: e.id, name: e.name, type: e.type, role: e.role })} className="p-3 bg-blue-50 rounded-xl"><Edit3/></button><button onClick={() => { if(window.confirm('刪除?')) saveToCloudAndLocal('employee', e.id, null); }} className="p-3 bg-red-50 rounded-xl text-red-500"><Trash2/></button></div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* 💡 排班編輯 (5格：據點、上班、下班、崗位、備註) */}
            {eShift && (
              <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-2xl flex items-center justify-center z-[5000] p-6 font-black font-sans">
                <div className="bg-white rounded-[3rem] w-full max-w-4xl max-h-[90vh] flex flex-col shadow-2xl">
                  <div className="bg-orange-600 p-6 text-white flex justify-between items-center"><h3 className="text-2xl"><Clock className="inline mr-2"/>排班 ({fEmployees.find(e=>e.id===eShift.empId)?.name})</h3><button onClick={() => setEShift(null)}><X/></button></div>
                  <div className="p-8 overflow-y-auto space-y-6 flex-1 bg-slate-50">
                    <div className="grid grid-cols-4 gap-4">
                      {['work', 'off', 'annual', 'sick', 'schedule_off', 'madou_off', 'liujia_off'].map(id => (
                        <button key={id} onClick={() => setEShift({...eShift, leaveType: id})} className={`py-4 rounded-xl border-2 text-lg ${eShift.leaveType===id ? 'border-orange-600 text-orange-600 bg-white shadow-2xl scale-105':'border-slate-200 text-slate-400 bg-white'}`}>{id==='work'?'出勤':id==='off'?'休假':id==='schedule_off'?'排休':id==='madou_off'?'麻豆店休':id==='liujia_off'?'六甲店休':id==='annual'?'特休':'病假'}</button>
                      ))}
                    </div>
                    {eShift.leaveType === 'work' && (
                      <>
                        <div className="bg-orange-50 p-6 rounded-2xl flex gap-2 flex-wrap">
                          <button onClick={() => applyShiftTemplate('full')} className="px-4 py-2 bg-orange-600 text-white rounded-lg">月薪全班</button>
                          <button onClick={() => applyShiftTemplate('morning')} className="px-4 py-2 bg-orange-500 text-white rounded-lg">早班</button>
                          <button onClick={() => applyShiftTemplate('evening')} className="px-4 py-2 bg-indigo-500 text-white rounded-lg">晚班</button>
                          <button onClick={() => applyShiftTemplate('pt_a')} className="px-4 py-2 bg-teal-500 text-white rounded-lg">PT午班</button>
                          <button onClick={() => applyShiftTemplate('pt_b')} className="px-4 py-2 bg-blue-500 text-white rounded-lg">PT晚班</button>
                          <button onClick={() => applyShiftTemplate('clear')} className="px-4 py-2 bg-slate-300 rounded-lg">清空</button>
                        </div>
                        {[1, 2, 3].map(n => (
                          <div key={n} className="p-6 bg-white rounded-2xl shadow-sm border-2">
                            <div className="flex justify-between items-center mb-4"><span className="text-orange-600">第 {n} 段班</span><select value={eShift[`shift${n}SubId`]||''} onChange={e=>setEShift({...eShift,[`shift${n}SubId`]:e.target.value})} className="border p-1 rounded"><option value="">本人出勤</option>{fEmployees.filter(emp=>emp.id!==eShift.empId).map(e=><option key={e.id} value={e.id}>{e.name}代</option>)}</select></div>
                            
                            <div className="flex flex-col md:flex-row gap-3">
                               <div className="flex flex-col gap-1 w-full md:w-24 shrink-0">
                                   <label className="text-[10px] text-slate-400">據點</label>
                                   <select value={eShift[`shift${n}Loc`]||'麻豆'} onChange={e=>setEShift({...eShift,[`shift${n}Loc`]:e.target.value})} className="border-2 p-2.5 rounded-xl text-lg font-black outline-none"><option>麻豆</option><option>六甲</option><option>茂迪</option><option>餐車</option></select>
                               </div>
                               <div className="flex flex-col gap-1 w-full md:w-28 shrink-0">
                                   <label className="text-[10px] text-slate-400">上班</label>
                                   <input type="time" value={eShift[`shift${n}Start`]||''} onChange={e=>setEShift({...eShift,[`shift${n}Start`]:e.target.value})} className="border-2 p-2.5 rounded-xl text-lg font-black font-mono outline-none"/>
                               </div>
                               <div className="flex flex-col gap-1 w-full md:w-28 shrink-0">
                                   <label className="text-[10px] text-slate-400">下班</label>
                                   <input type="time" value={eShift[`shift${n}End`]||''} onChange={e=>setEShift({...eShift,[`shift${n}End`]:e.target.value})} className="border-2 p-2.5 rounded-xl text-lg font-black font-mono outline-none"/>
                               </div>
                               <div className="flex flex-col gap-1 w-full flex-1">
                                   <label className="text-[10px] text-blue-600">手動崗位(選填)</label>
                                   <input type="text" list="station-options" placeholder="選填" value={eShift[`shift${n}Station`]||''} onChange={e=>setEShift({...eShift,[`shift${n}Station`]:e.target.value})} className="border-2 border-blue-200 bg-blue-50 focus:bg-white p-2.5 rounded-xl text-lg font-black text-blue-800 outline-none"/>
                               </div>
                               <div className="flex flex-col gap-1 w-full flex-1">
                                   <label className="text-[10px] text-slate-500">文字備註(選填)</label>
                                   <input type="text" placeholder="選填" value={eShift[`shift${n}Note`]||''} onChange={e=>setEShift({...eShift,[`shift${n}Note`]:e.target.value})} className="border-2 border-slate-200 bg-slate-50 focus:bg-white p-2.5 rounded-xl text-lg font-black text-slate-700 outline-none"/>
                               </div>
                            </div>
                          </div>
                        ))}
                      </>
                    )}
                  </div>
                  <div className="p-6 bg-white"><button onClick={() => { saveToCloudAndLocal('shift', `${eShift.empId}_${eShift.key}`, {...eShift, base}); setEShift(null); triggerToast(); }} className="w-full py-6 bg-orange-600 text-white rounded-2xl text-2xl font-black">💾 儲存排班</button></div>
                </div>
              </div>
            )}

            {/* 營運記事 */}
            {eEvent && (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[5500] p-6 font-black font-sans">
                <div className="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl animate-in zoom-in-95 border-4 border-white/20">
                  <div className="flex justify-between items-center mb-4"><h3 className="text-2xl text-orange-600">記事設定</h3><button onClick={() => setEEvent(null)} className="text-slate-400 hover:text-black"><X/></button></div>
                  <textarea id="et-box" className="w-full border-4 p-4 rounded-xl h-48 text-xl outline-none focus:border-orange-500 bg-slate-50" defaultValue={eEvent.text} placeholder="例如：六甲店休" />
                  <button onClick={() => { const txt = document.getElementById('et-box').value; const k = getDayKey(new Date(date.getFullYear(), date.getMonth(), eEvent.day)); saveToCloudAndLocal('event', `event_${k}`, { key: k, text: txt.trim(), base }); setEEvent(null); triggerToast(); }} className="w-full py-4 mt-4 bg-orange-600 text-white rounded-xl text-xl">💾 儲存事項</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
